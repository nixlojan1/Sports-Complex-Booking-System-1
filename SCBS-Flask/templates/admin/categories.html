<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Complex Booking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    display: flex;
    background: #0f1117;
    color: #e6f1ff;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #0f1117, #0a1f2e, #0c2d3f);
    position: fixed;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1f2a38;
}

.sidebar-header {
    padding: 15px;
    border-bottom: 1px solid #1f2a38;
    color: #00e5ff;
}

.menu {
    padding: 20px 0;
    flex-grow: 1;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    color: #9fb3c8;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.menu a:hover,
.menu a.active {
    background: rgba(0, 229, 255, 0.15);
    color: #00e5ff;
    border-left: 3px solid #00e5ff;
}

.menu-title {
    padding: 15px 20px 5px;
    font-size: 11px;
    color: #6b85a6;
    text-transform: uppercase;
}


/* MAIN */
.main {
    margin-left: 230px;
    width: 100%;
}

/* TOPBAR */
.topbar {
    background: #0f1117;
    padding: 12px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2a38;
}

.topbar h3 {
    font-size: 18px;
    color: #00e5ff;
}

/* PROFILE MENU */
#profileMenu {
    display:none;
    position:absolute;
    right:0;
    top:45px;
    background:#0f1722;
    border-radius:8px;
    border:1px solid #1f2a38;
    width:150px;
}

#profileMenu a {
    display:block;
    padding:10px;
    color:#cfe8ff;
    text-decoration:none;
}

#profileMenu a:hover {
    background: rgba(0,229,255,0.1);
}

/* CONTENT */
.content {
    padding: 25px;
}

/* TABLE CONTAINER */
.table-container {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 20px;
}

/* HEADER */
.table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.table-header h4 {
    color: #00e5ff;
}

/* SEARCH */
.search-box input {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
    outline: none;
    transition: 0.3s;
}

.search-box input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 8px rgba(0,229,255,0.3);
}

.search-box input::placeholder {
    color: #6b85a6;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #0a1f2e;
}

th {
    color: #00e5ff;
    font-weight: 500;
}

th, td {
    padding: 10px;
    font-size: 13px;
    text-align: left;
}

tbody tr {
    border-top: 1px solid #1f2a38;
    transition: 0.2s;
}

tbody tr:hover {
    background: rgba(0, 229, 255, 0.08);
}

/* ACTION BUTTON */
.action-btn {
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    color: #001018;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
}



/* EMPTY STATE */
.empty-state {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    color: #6b85a6;
}

.empty-state i {
    font-size: 40px;
    color: #00e5ff;
    margin-bottom: 10px;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: linear-gradient(145deg, #0f1722, #111827);
    border: 1px solid #1f2a38;
    width: 420px;
    margin: 8% auto;
    padding: 25px;
    border-radius: 12px;
    color: #e6f1ff;
    box-shadow: 0 0 20px rgba(0,229,255,0.1);
    animation: fadeIn 0.3s ease;
}

.modal-content h3 {
    margin-bottom: 15px;
    color: #00e5ff;
}

.modal-content label {
    font-size: 13px;
    color: #9fb3c8;
}

.modal-content input,
.modal-content textarea,
.modal-content select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
}

.modal-content input:focus,
.modal-content textarea:focus,
.modal-content select:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 6px rgba(0,229,255,0.3);
}

.submit-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    border-radius: 6px;
    color: #001018;
    font-weight: bold;
    cursor: pointer;
}

.close {
    float: right;
    font-size: 18px;
    cursor: pointer;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #6b85a6;
}

/* RESPONSIVE */
@media(max-width: 600px){
    .sidebar { display: none; }
    .main { margin-left: 0; }
}

/* PAGINATION */
.pagination {
    margin-top: 12px;
    display: flex;
    justify-content: center;   /* centers horizontally */
    align-items: center;
    gap: 6px;                  /* replaces margin spacing */
    flex-wrap: wrap;
}

.pagination button {
    background: none;
    border: 1px solid #1f2a38;
    color: #cfe8ff;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.2s;
}

.pagination button:hover {
    background: rgba(0,229,255,0.15);
}

.pagination button.active {
    background: #00e5ff;
    color: #001018;
    font-weight: bold;
}

.pagination button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="sidebar-header">
        <h2>SCBS - Admin</h2>
    </div>

    <div class="menu">

        <a href="{{ url_for('dashboard') }}"
        class="{% if active_page == 'dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> Dashboard
        </a>

        <a href="{{ url_for('reservations') }}"
        class="{% if active_page == 'reservations' %}active{% endif %}">
            <i class="fas fa-calendar-check"></i> Reservations
        </a>

        <div class="menu-title">Management</div>

        <a href="{{ url_for('categories') }}"
        class="{% if active_page == 'categories' %}active{% endif %}">
            <i class="fas fa-layer-group"></i> Categories
        </a>

        <a href="{{ url_for('facilities') }}"
        class="{% if active_page == 'facilities' %}active{% endif %}">
            <i class="fas fa-building"></i> Facilities
        </a>

        <a href="{{ url_for('users') }}"
        class="{% if active_page == 'users' %}active{% endif %}">
            <i class="fas fa-users"></i> Users
        </a>

        <a href="{{ url_for('inquiries') }}"
        class="{% if active_page == 'inquiries' %}active{% endif %}">
            <i class="fas fa-envelope"></i> Inquiries
        </a>

        <div class="menu-title">Logs</div>

        <a href="{{ url_for('history_log') }}"
        class="{% if active_page == 'history_log' %}active{% endif %}">
            <i class="fas fa-history"></i> History Log
        </a>

        <div class="menu-title">Account</div>

        <a href="{{ url_for('logout') }}"
           style="color:#ff6b6b;"
           onclick="return confirm('Are you sure you want to logout?')">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>

    </div>

</div>
<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h3>Categories</h3>

        <div class="user" style="position: relative;">
            <img src="https://i.pravatar.cc/40" 
                style="width:35px; height:35px; border-radius:50%; cursor:pointer;" 
                onclick="toggleMenu()">

            <div id="profileMenu">
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#" style="color:#ff6b6b;">Logout</a>
            </div>
        </div>
    </div>

<div class="content">

<div class="table-container">

    <!-- HEADER -->
    <div class="table-header" style="display:flex; justify-content:space-between; align-items:center;">

        <!-- LEFT -->
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="action-btn" onclick="openCreateModal()">
                + Add Category
            </button>
        </div>

        <!-- RIGHT -->
        <div class="search-box">
            <input 
                type="text" 
                id="searchCategory" 
                placeholder="Search category...">
        </div>

    </div>

    <!-- TABLE -->
    <table class="category-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Category Name</th>
                <th>Description</th>
                <th>Status</th>
                <th style="text-align:center;">Action</th>
            </tr>
        </thead>

        <tbody id="categoryTableBody">
            <!-- DATA WILL BE LOADED VIA loadCategories() -->
        </tbody>
    </table>

</div>

<!-- ✅ PAGINATION (OUTSIDE CONTAINER) -->
<div class="pagination" id="categoryPagination"></div>

</div>

    <div class="footer">
        © 2026 Sports Complex Booking System
    </div>

</div>

<!-- CREATE CATEGORY MODAL -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeCreateModal()">&times;</span>

        <h3>Create Category</h3>

        <form id="createCategoryForm">

            <input type="hidden" id="categoryId">

            <label>Category Name *</label>
            <input type="text" id="categoryName" required>

            <label>Description</label>
            <textarea id="categoryDescription"></textarea>

            <label>Status</label>
            <select id="categoryStatus">
                <option value="Available">Available</option>
                <option value="Unavailable">Unavailable</option>
            </select>

            <button type="submit" class="submit-btn">Save</button>

        </form>
    </div>
</div>

<script>

// =============================
// GLOBAL STATE (PAGINATION)
// =============================
let categoriesData = [];
let currentPage = 1;
const rowsPerPage = 6;

// =============================
// LOAD DATA
// =============================
function loadCategories() {
    fetch("/get_categories")
    .then(res => res.json())
    .then(data => {

        categoriesData = data;   // store globally
        currentPage = 1;         // reset page
        renderTable();

    });
}

// =============================
// RENDER TABLE (PAGINATED)
// =============================
function renderTable() {

    const table = document.getElementById("categoryTableBody");
    table.innerHTML = "";

    let start = (currentPage - 1) * rowsPerPage;
    let end = start + rowsPerPage;

    let pageData = categoriesData.slice(start, end);

    if (pageData.length === 0) {
        table.innerHTML = `
            <tr>
                <td colspan="5" style="text-align:center;">No categories found</td>
            </tr>
        `;
        renderPagination();
        return;
    }

    pageData.forEach(cat => {
        table.innerHTML += `
            <tr>
                <td>${cat.id}</td>
                <td>${cat.name}</td>
                <td>${cat.description ?? '-'}</td>
                <td>${cat.status}</td>

                <td style="text-align:center; white-space:nowrap;">

                    <button class="action-btn"
                        onclick="openEditModal(${cat.id}, '${cat.name}', '${cat.description}', '${cat.status}')">
                        Edit
                    </button>

                    <button class="action-btn" style="background:#ff6b6b; color:#fff;"
                        onclick="deleteCategory(${cat.id})">
                        Delete
                    </button>

                </td>
            </tr>
        `;
    });

    renderPagination();
}

// =============================
// PAGINATION UI
// =============================
function renderPagination() {

    let container = document.getElementById("categoryPagination");
    if (!container) return;

    container.innerHTML = "";

    let totalPages = Math.ceil(categoriesData.length / rowsPerPage);

    if (totalPages <= 1) return;

    // PREV
    container.innerHTML += `
        <button onclick="changePage(${currentPage - 1})"
        ${currentPage === 1 ? "disabled" : ""}>
            &lt;
        </button>
    `;

    // NUMBERS
    for (let i = 1; i <= totalPages; i++) {
        container.innerHTML += `
            <button class="${i === currentPage ? 'active' : ''}"
                onclick="changePage(${i})">
                ${i}
            </button>
        `;
    }

    // NEXT
    container.innerHTML += `
        <button onclick="changePage(${currentPage + 1})"
        ${currentPage === totalPages ? "disabled" : ""}>
            &gt;
        </button>
    `;
}

// =============================
// CHANGE PAGE
// =============================
function changePage(page) {

    let totalPages = Math.ceil(categoriesData.length / rowsPerPage);

    if (page < 1 || page > totalPages) return;

    currentPage = page;
    renderTable();
}


// =============================
// SEARCH (FIXED + PAGINATION SAFE)
// =============================
document.getElementById("searchCategory").addEventListener("input", function () {

    const keyword = this.value.toLowerCase().trim();

    const filtered = categoriesData.filter(cat => {
        return (
            (cat.name || "").toLowerCase().includes(keyword) ||
            (cat.description || "").toLowerCase().includes(keyword) ||
            (cat.status || "").toLowerCase().includes(keyword)
        );
    });

    currentPage = 1;

    // temporarily replace dataset for rendering
    tempData = filtered;

    renderFilteredTable(filtered);
});
// =============================
// PAGE LOAD
// =============================
window.onload = function() {
    loadCategories();
};

// =============================
// MODAL
// =============================
function openCreateModal() {
    document.getElementById("createModal").style.display = "block";
}

function closeCreateModal() {
    document.getElementById("createModal").style.display = "none";
}

// =============================
// SUBMIT FORM
// =============================
document.getElementById("createCategoryForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const id = document.getElementById("categoryId").value;
    const name = document.getElementById("categoryName").value;
    const description = document.getElementById("categoryDescription").value;
    const status = document.getElementById("categoryStatus").value;

    const url = id ? `/update_category/${id}` : "/create_category";

    const actionText = id ? "Update" : "Create";

    Swal.fire({
        title: `${actionText} Category?`,
        icon: "question",
        showCancelButton: true,
        confirmButtonText: "Yes"
    }).then(result => {

        if (!result.isConfirmed) return;

        fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, description, status })
        })
        .then(res => res.json())
        .then(data => {

            Swal.fire("Success", data.message, "success");

            closeCreateModal();
            this.reset();
            document.getElementById("categoryId").value = "";
            document.querySelector(".modal-content h3").innerText = "Create Category";

            loadCategories();
        });

    });
});

// =============================
// OPEN EDIT
// =============================
function openEditModal(id, name, description, status) {

    document.getElementById("categoryId").value = id;
    document.getElementById("categoryName").value = name;
    document.getElementById("categoryDescription").value = description;
    document.getElementById("categoryStatus").value = status;

    document.querySelector(".modal-content h3").innerText = "Edit Category";

    document.getElementById("createModal").style.display = "block";
}

// =============================
// DELETE
// =============================
function deleteCategory(id) {

    Swal.fire({
        title: "Delete Category?",
        text: "This action cannot be undone!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#ff6b6b",
        confirmButtonText: "Yes, delete it"
    }).then(result => {

        if (!result.isConfirmed) return;

        fetch(`/delete_category/${id}`, {
            method: "POST"
        })
        .then(res => res.json())
        .then(data => {

            Swal.fire("Deleted!", data.message, "success");
            loadCategories();
        });

    });
}

</script>


</body>
</html>
