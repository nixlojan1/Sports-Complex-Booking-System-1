<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Complex Booking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    display: flex;
    background: #0f1117;
    color: #e6f1ff;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #0f1117, #0a1f2e, #0c2d3f);
    position: fixed;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1f2a38;
}

.sidebar-header {
    padding: 15px;
    border-bottom: 1px solid #1f2a38;
    color: #00e5ff;
}

.menu { padding: 20px 0; flex-grow: 1; }

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    color: #9fb3c8;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.menu a:hover,
.menu a.active {
    background: rgba(0, 229, 255, 0.15);
    color: #00e5ff;
    border-left: 3px solid #00e5ff;
}

.menu-title {
    padding: 15px 20px 5px;
    font-size: 11px;
    color: #6b85a6;
    text-transform: uppercase;
}

/* MAIN */
.main {
    margin-left: 230px;
    width: 100%;
}

/* TOPBAR */
.topbar {
    background: #0f1117;
    padding: 12px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2a38;
}

.topbar h3 {
    font-size: 18px;
    color: #00e5ff;
}

/* PROFILE MENU */
#profileMenu {
    display: none;
    position: absolute;
    right: 0;
    top: 45px;
    background: #0f1722;
    border-radius: 8px;
    border: 1px solid #1f2a38;
    width: 150px;
    z-index: 10;
}

#profileMenu a {
    display: block;
    padding: 10px;
    color: #cfe8ff;
    text-decoration: none;
}

#profileMenu a:hover {
    background: rgba(0,229,255,0.1);
}

/* CONTENT */
.content {
    padding: 25px;
}

/* TABLE CONTAINER */
.table-container {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 20px;
}

/* TABLE HEADER */
.table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
}

.table-header h4 {
    color: #00e5ff;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

/* SEARCH */
.search-box input {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
    outline: none;
    transition: 0.3s;
}

.search-box input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 8px rgba(0,229,255,0.3);
}

.search-box input::placeholder {
    color: #6b85a6;
}

/* CATEGORY FILTER SELECT */
#categoryFilter {
    padding: 8px 12px;
    border-radius: 6px;
    background: #0a0f1a;
    color: #e6f1ff;
    border: 1px solid #1f2a38;
    outline: none;
    cursor: pointer;
    font-size: 13px;
    transition: 0.3s;
}

#categoryFilter:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 8px rgba(0,229,255,0.3);
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #0a1f2e;
}

th {
    color: #00e5ff;
    font-weight: 500;
}

th, td {
    padding: 10px;
    font-size: 13px;
    text-align: left;
}

tbody tr {
    border-top: 1px solid #1f2a38;
    transition: 0.2s;
}

tbody tr:hover {
    background: rgba(0, 229, 255, 0.08);
}

/* BUTTONS */
.action-btn {
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    color: #001018;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: 0.2s;
    white-space: nowrap;
}

.action-btn:hover { opacity: 0.85; }

/* STATUS BADGE */
.badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
}

.badge-available {
    background: rgba(0, 229, 150, 0.15);
    color: #00e596;
    border: 1px solid rgba(0, 229, 150, 0.3);
}

.badge-unavailable {
    background: rgba(255, 107, 107, 0.15);
    color: #ff6b6b;
    border: 1px solid rgba(255, 107, 107, 0.3);
}

.badge-maintenance {
    background: rgba(255, 193, 7, 0.15);
    color: #ffc107;
    border: 1px solid rgba(255, 193, 7, 0.3);
}

/* EMPTY STATE */
.empty-state {
    text-align: center;
    color: #6b85a6;
    padding: 30px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #6b85a6;
}

/* RESPONSIVE */
@media(max-width: 600px){
    .sidebar { display: none; }
    .main { margin-left: 0; }
}

/* PAGINATION */
.pagination {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
}

.pagination button {
    background: none;
    border: 1px solid #1f2a38;
    color: #cfe8ff;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.2s;
}

.pagination button:hover {
    background: rgba(0,229,255,0.15);
}

.pagination button.active {
    background: #00e5ff;
    color: #001018;
    font-weight: bold;
}

.pagination button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 999;
}

.modal-content {
    background: linear-gradient(145deg, #0f1722, #111827);
    border: 1px solid #1f2a38;
    width: 420px;
    margin: 5% auto;
    padding: 25px;
    border-radius: 12px;
    color: #e6f1ff;
    box-shadow: 0 0 20px rgba(0,229,255,0.1);
    animation: fadeIn 0.25s ease;
    max-height: 88vh;
    overflow-y: auto;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.modal-content h3 {
    margin-bottom: 15px;
    color: #00e5ff;
}

.modal-content label {
    font-size: 13px;
    color: #9fb3c8;
}

.modal-content input,
.modal-content textarea,
.modal-content select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
    outline: none;
    transition: 0.2s;
}

.modal-content input:focus,
.modal-content textarea:focus,
.modal-content select:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 6px rgba(0,229,255,0.3);
}

.submit-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    border-radius: 6px;
    color: #001018;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.submit-btn:hover { opacity: 0.85; }

.close {
    float: right;
    font-size: 18px;
    cursor: pointer;
    color: #6b85a6;
    transition: 0.2s;
}

.close:hover { color: #ff6b6b; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-header">
        <h2>SCBS - Admin</h2>
    </div>

    <div class="menu">
        <a href="{{ url_for('dashboard') }}"
           class="{% if active_page == 'dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> Dashboard
        </a>

        <a href="{{ url_for('reservations') }}"
           class="{% if active_page == 'reservations' %}active{% endif %}">
            <i class="fas fa-calendar-check"></i> Reservations
        </a>

        <div class="menu-title">Management</div>

        <a href="{{ url_for('categories') }}"
           class="{% if active_page == 'categories' %}active{% endif %}">
            <i class="fas fa-layer-group"></i> Categories
        </a>

        <a href="{{ url_for('facilities') }}"
           class="{% if active_page == 'facilities' %}active{% endif %}">
            <i class="fas fa-building"></i> Facilities
        </a>

        <a href="{{ url_for('users') }}"
           class="{% if active_page == 'users' %}active{% endif %}">
            <i class="fas fa-users"></i> Users
        </a>

        <a href="{{ url_for('inquiries') }}"
           class="{% if active_page == 'inquiries' %}active{% endif %}">
            <i class="fas fa-envelope"></i> Inquiries
        </a>

        <div class="menu-title">Logs</div>
        <a href="{{ url_for('sales') }}"
           class="{% if active_page == 'sales' %}active{% endif %}">
            <i class="fas fa-chart-line"></i> Sales
        </a>
        <a href="{{ url_for('history_log') }}"
           class="{% if active_page == 'history_log' %}active{% endif %}">
            <i class="fas fa-history"></i> History Log
        </a>

        <div class="menu-title">Account</div>
        <a href="{{ url_for('logout') }}"
           style="color:#ff6b6b;"
           onclick="return confirm('Are you sure you want to logout?')">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h3>Facilities</h3>
        <div class="user" style="position: relative;">
            <img src="https://i.pravatar.cc/40"
                 style="width:35px; height:35px; border-radius:50%; cursor:pointer;"
                 onclick="toggleMenu()">
            <div id="profileMenu">
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#" style="color:#ff6b6b;">Logout</a>
            </div>
        </div>
    </div>

    <div class="content">

        <div class="table-container">

            <div class="table-header">

                <!-- LEFT: title + add button -->
                <div class="header-left">
                    <button class="action-btn" onclick="openCreateModal()">
                        <i class="fas fa-plus"></i> Add Facility
                    </button>
                </div>

                <!-- RIGHT: category filter + search -->
                <div class="header-right">
                    <select id="categoryFilter" onchange="applyFilters()">
                        <option value="all">All Categories</option>
                        {% for c in categories %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="search-box">
                        <input type="text"
                               id="searchInput"
                               placeholder="Search facility..."
                               oninput="applyFilters()">
                    </div>
                </div>

            </div>

            <!-- TABLE -->
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>IMAGE</th>
                        <th>CATEGORY</th>
                        <th>NAME</th>
                        <th>DESCRIPTION</th>
                        <th>CAPACITY</th>
                        <th>PRICE/HR</th>
                        <th>STATUS</th>
                        <th style="text-align:center;">ACTION</th>
                    </tr>
                </thead>
                <tbody id="facilityTableBody"></tbody>
            </table>

        </div>

        <!-- PAGINATION OUTSIDE CONTAINER -->
        <div class="pagination" id="pagination"></div>

    </div>

    <div class="footer">
        © 2026 Sports Complex Booking System
    </div>

    <!-- FACILITY MODAL -->
    <div id="facilityModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Add Facility</h3>

            <form id="facilityForm" enctype="multipart/form-data">
                <input type="hidden" id="facilityId">

                <label>Category *</label>
                <select id="facilityCategory" required>
                    <option value="">Select Category</option>
                    {% for c in categories %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>

                <label>Name *</label>
                <input type="text" id="facilityName" required>

                <label>Description</label>
                <textarea id="facilityDescription" rows="3"></textarea>

                <label>Image</label>
                <input type="file" id="facilityImage" accept="image/*">
                <img id="imagePreview"
                     style="margin-top:5px; max-width:100%; display:none; border-radius:8px; margin-bottom:10px;" />

                <label>Capacity</label>
                <input type="number" id="facilityCapacity">

                <label>Price per hour</label>
                <input type="number" id="facilityPrice">

                <label>Status</label>
                <select id="facilityStatus">
                    <option value="Available">Available</option>
                    <option value="Unavailable">Unavailable</option>
                    <option value="Maintenance">Maintenance</option>
                </select>

                <button type="submit" class="submit-btn">Save</button>
            </form>
        </div>
    </div>

</div>

<script>
// ============================================================
// STATE
// ============================================================
let allFacilities = [];
let currentPage   = 1;
const rowsPerPage = 5;
let searchValue   = "";
let categoryValue = "all";

// ============================================================
// LOAD
// ============================================================
function loadFacilities() {
    fetch("/facilities_data")
        .then(res => res.json())
        .then(data => {
            allFacilities = data;
            currentPage   = 1;
            renderTable();
        })
        .catch(err => console.error("Failed to load facilities:", err));
}

// ============================================================
// FILTER
// ============================================================
function applyFilters() {
    searchValue   = document.getElementById("searchInput").value.toLowerCase();
    categoryValue = document.getElementById("categoryFilter").value;
    currentPage   = 1;
    renderTable();
}

function getFilteredRows() {
    return allFacilities.filter(f => {
        const haystack = [
            f.id, f.category_name, f.name,
            f.description, f.capacity, f.price_per_hour, f.status
        ].join(" ").toLowerCase();

        const matchSearch   = !searchValue || haystack.includes(searchValue);
        const matchCategory = categoryValue === "all" || String(f.category_id) === categoryValue;

        return matchSearch && matchCategory;
    });
}

// ============================================================
// RENDER TABLE
// ============================================================
function renderTable() {
    const filtered = getFilteredRows();
    const start    = (currentPage - 1) * rowsPerPage;
    const pageData = filtered.slice(start, start + rowsPerPage);
    const tbody    = document.getElementById("facilityTableBody");
    tbody.innerHTML = "";

    if (pageData.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="9" style="text-align:center; color:#6b85a6; padding:30px;">
                    No facilities found.
                </td>
            </tr>`;
        renderPagination(filtered.length);
        return;
    }

    pageData.forEach(f => {
        const statusMap = {
            "Available":   "badge badge-available",
            "Unavailable": "badge badge-unavailable",
            "Maintenance": "badge badge-maintenance"
        };
        const badgeClass = statusMap[f.status] || "badge";

        tbody.innerHTML += `
            <tr>
                <td>${f.id}</td>
                <td>
                    ${f.image
                        ? `<img src="/static/uploads/facilities/${f.image}"
                                style="width:46px;height:46px;object-fit:cover;border-radius:6px;border:1px solid #1f2a38;">`
                        : '<span style="color:#6b85a6;">—</span>'}
                </td>
                <td>${f.category_name || '—'}</td>
                <td>${f.name}</td>
                <td>${f.description || '—'}</td>
                <td>${f.capacity || '—'}</td>
                <td>${f.price_per_hour ? '&#8369;' + parseFloat(f.price_per_hour).toFixed(2) : '—'}</td>
                <td><span class="${badgeClass}">${f.status}</span></td>
                <td style="text-align:center; white-space:nowrap;">
                    <button class="action-btn" onclick="openEditModal(${f.id})">
                        <i class="fas fa-edit"></i> Edit
                    </button>
                    <button class="action-btn"
                            style="background:#ff6b6b; color:#fff; margin-left:4px;"
                            onclick="deleteFacility(${f.id})">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </td>
            </tr>`;
    });

    renderPagination(filtered.length);
}

// ============================================================
// PAGINATION
// ============================================================
function renderPagination(totalRows) {
    const container  = document.getElementById("pagination");
    container.innerHTML = "";

    const totalPages = Math.ceil(totalRows / rowsPerPage) || 1;
    if (currentPage > totalPages) currentPage = 1;
    if (totalPages <= 1) return;

    // PREV
    const prev = document.createElement("button");
    prev.textContent = "<";
    prev.disabled    = currentPage === 1;
    prev.onclick     = () => { currentPage--; renderTable(); };
    container.appendChild(prev);

    // PAGE NUMBERS
    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => { currentPage = i; renderTable(); };
        container.appendChild(btn);
    }

    // NEXT
    const next = document.createElement("button");
    next.textContent = ">";
    next.disabled    = currentPage === totalPages;
    next.onclick     = () => { currentPage++; renderTable(); };
    container.appendChild(next);
}

// ============================================================
// PROFILE MENU
// ============================================================
function toggleMenu() {
    const menu = document.getElementById("profileMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

window.addEventListener("click", function (e) {
    if (!e.target.closest(".user")) {
        document.getElementById("profileMenu").style.display = "none";
    }
});

// ============================================================
// MODAL
// ============================================================
function openCreateModal() {
    document.getElementById("modalTitle").innerText      = "Add Facility";
    document.getElementById("facilityForm").reset();
    document.getElementById("facilityId").value          = "";
    document.getElementById("imagePreview").style.display = "none";
    document.getElementById("facilityModal").style.display = "block";
}

function closeModal() {
    document.getElementById("facilityModal").style.display = "none";
}

// Close on backdrop click
window.addEventListener("click", function (e) {
    const modal = document.getElementById("facilityModal");
    if (e.target === modal) closeModal();
});

// ============================================================
// EDIT MODAL
// ============================================================
function openEditModal(id) {
    fetch(`/get_facility/${id}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("modalTitle").innerText          = "Edit Facility";
            document.getElementById("facilityId").value             = data.id;
            document.getElementById("facilityCategory").value       = data.category_id;
            document.getElementById("facilityName").value           = data.name;
            document.getElementById("facilityDescription").value    = data.description    || "";
            document.getElementById("facilityCapacity").value       = data.capacity       || "";
            document.getElementById("facilityPrice").value          = data.price_per_hour || "";
            document.getElementById("facilityStatus").value         = data.status;
            document.getElementById("facilityImage").value          = "";

            const preview = document.getElementById("imagePreview");
            if (data.image) {
                preview.src = "/static/uploads/facilities/" + data.image;
                preview.style.display = "block";
            } else {
                preview.style.display = "none";
            }

            document.getElementById("facilityModal").style.display = "block";
        });
}

// ============================================================
// SAVE (CREATE + UPDATE)
// ============================================================
document.getElementById("facilityForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const id       = document.getElementById("facilityId").value;
    const formData = new FormData();

    formData.append("category_id",    document.getElementById("facilityCategory").value);
    formData.append("name",           document.getElementById("facilityName").value);
    formData.append("description",    document.getElementById("facilityDescription").value);
    formData.append("capacity",       document.getElementById("facilityCapacity").value);
    formData.append("price_per_hour", document.getElementById("facilityPrice").value);
    formData.append("status",         document.getElementById("facilityStatus").value);

    const fileInput = document.getElementById("facilityImage");
    if (fileInput.files.length > 0) {
        formData.append("image", fileInput.files[0]);
    }

    const url = id ? `/update_facility/${id}` : "/create_facility";

    fetch(url, { method: "POST", body: formData })
        .then(res => res.json())
        .then(res => {
            Swal.fire({
                title: "Success!",
                text: res.message,
                icon: "success",
                timer: 1500,
                showConfirmButton: false
            });
            closeModal();
            loadFacilities();
        })
        .catch(() => Swal.fire("Error", "Something went wrong!", "error"));
});

// ============================================================
// DELETE
// ============================================================
function deleteFacility(id) {
    Swal.fire({
        title: "Delete Facility?",
        text: "This action cannot be undone!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#ff6b6b",
        cancelButtonColor: "#6b85a6",
        confirmButtonText: "Yes, delete it"
    }).then(result => {
        if (!result.isConfirmed) return;
        fetch(`/delete_facility/${id}`, { method: "POST" })
            .then(res => res.json())
            .then(data => {
                Swal.fire({
                    title: "Deleted!",
                    text: data.message,
                    icon: "success",
                    timer: 1200,
                    showConfirmButton: false
                });
                loadFacilities();
            });
    });
}

// ============================================================
// IMAGE PREVIEW
// ============================================================
document.getElementById("facilityImage").addEventListener("change", function (e) {
    const file    = e.target.files[0];
    const preview = document.getElementById("imagePreview");
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});

// ============================================================
// INIT
// ============================================================
window.onload = loadFacilities;
</script>

</body>
</html>
