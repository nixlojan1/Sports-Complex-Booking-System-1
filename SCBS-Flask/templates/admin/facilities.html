<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Complex Booking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    display: flex;
    background: #0f1117;
    color: #e6f1ff;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #0f1117, #0a1f2e, #0c2d3f);
    position: fixed;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1f2a38;
}

.sidebar-header {
    padding: 15px;
    border-bottom: 1px solid #1f2a38;
    color: #00e5ff;
}

.menu {
    padding: 20px 0;
    flex-grow: 1;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    color: #9fb3c8;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.menu a:hover,
.menu a.active {
    background: rgba(0, 229, 255, 0.15);
    color: #00e5ff;
    border-left: 3px solid #00e5ff;
}

.menu-title {
    padding: 15px 20px 5px;
    font-size: 11px;
    color: #6b85a6;
    text-transform: uppercase;
}

/* MAIN */
.main {
    margin-left: 230px;
    width: 100%;
}

/* TOPBAR */
.topbar {
    background: #0f1117;
    padding: 12px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2a38;
}

.topbar h3 {
    font-size: 18px;
    color: #00e5ff;
}

/* PROFILE MENU */
#profileMenu {
    display: none;
    position: absolute;
    right: 0;
    top: 45px;
    background: #0f1722;
    border-radius: 8px;
    border: 1px solid #1f2a38;
    width: 150px;
}

#profileMenu a {
    display: block;
    padding: 10px;
    color: #cfe8ff;
    text-decoration: none;
}

#profileMenu a:hover {
    background: rgba(0, 229, 255, 0.1);
}

/* CONTENT */
.content {
    padding: 25px;
}

/* TABLE CONTAINER */
.table-container {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 20px;
}

/* TABLE HEADER */
.table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

/* SEARCH */
.search-box input {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
    outline: none;
    transition: 0.3s;
}

.search-box input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
}

.search-box input::placeholder {
    color: #6b85a6;
}

/* FILTER SELECT — matches inquiries statusFilter style */
#categoryFilter {
    padding: 6px 10px;
    border-radius: 6px;
    background: #0a0f1a;
    color: #e6f1ff;
    border: 1px solid #1f2a38;
    outline: none;
    cursor: pointer;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #0a1f2e;
}

th {
    color: #00e5ff;
    font-weight: 500;
}

th, td {
    padding: 10px;
    font-size: 13px;
    text-align: left;
}

tbody tr {
    border-top: 1px solid #1f2a38;
    transition: 0.2s;
}

tbody tr:hover {
    background: rgba(0, 229, 255, 0.08);
}

/* ACTION BUTTON */
.action-btn {
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    color: #001018;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
}

/* EMPTY */
.empty-state {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    color: #6b85a6;
}

.empty-state i {
    font-size: 40px;
    color: #00e5ff;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #6b85a6;
}

/* RESPONSIVE */
@media(max-width: 600px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
}

/* ==========================================
   PAGINATION — exact match to inquiries.html
   ========================================== */
.pagination {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
}

.pagination button {
    background: none;
    border: 1px solid #1f2a38;
    color: #cfe8ff;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.2s;
}

.pagination button:hover {
    background: rgba(0, 229, 255, 0.15);
}

.pagination button.active {
    background: #00e5ff;
    color: #001018;
    font-weight: bold;
}

.pagination button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

/* MODAL */
.modal {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    min-height: 100vh;
    background: rgba(0, 0, 0, 0.6);
    z-index: 999;
    pointer-events: auto;
}

.modal-content {
    background: linear-gradient(145deg, #0f1722, #111827);
    border: 1px solid #1f2a38;
    width: 420px;
    margin: 8% auto;
    padding: 25px;
    border-radius: 12px;
    color: #e6f1ff;
    box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
}

.modal-content h3 {
    margin-bottom: 15px;
    color: #00e5ff;
}

.modal-content label {
    font-size: 13px;
    color: #9fb3c8;
}

.modal-content input,
.modal-content textarea,
.modal-content select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
}

.modal-content input:focus,
.modal-content textarea:focus,
.modal-content select:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 6px rgba(0, 229, 255, 0.3);
    outline: none;
}

.submit-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    border-radius: 6px;
    color: #001018;
    font-weight: bold;
    cursor: pointer;
}

.close {
    float: right;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-header">
        <h2>SCBS - Admin</h2>
    </div>

    <div class="menu">
        <a href="{{ url_for('dashboard') }}"
           class="{% if active_page == 'dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> Dashboard
        </a>

        <a href="{{ url_for('reservations') }}"
           class="{% if active_page == 'reservations' %}active{% endif %}">
            <i class="fas fa-calendar-check"></i> Reservations
        </a>

        <div class="menu-title">Management</div>

        <a href="{{ url_for('categories') }}"
           class="{% if active_page == 'categories' %}active{% endif %}">
            <i class="fas fa-layer-group"></i> Categories
        </a>

        <a href="{{ url_for('facilities') }}"
           class="{% if active_page == 'facilities' %}active{% endif %}">
            <i class="fas fa-building"></i> Facilities
        </a>

        <a href="{{ url_for('users') }}"
           class="{% if active_page == 'users' %}active{% endif %}">
            <i class="fas fa-users"></i> Users
        </a>

        <a href="{{ url_for('inquiries') }}"
           class="{% if active_page == 'inquiries' %}active{% endif %}">
            <i class="fas fa-envelope"></i> Inquiries
        </a>

        <div class="menu-title">Logs</div>
        <a href="{{ url_for('sales') }}" class="{% if active_page=='sales' %}active{% endif %}">
            <i class="fas fa-chart-line"></i> Sales
        </a>
        <a href="{{ url_for('history_log') }}" class="{% if active_page == 'history_log' %}active{% endif %}">
            <i class="fas fa-history"></i> History Log
        </a>

        <div class="menu-title">Account</div>

        <a href="{{ url_for('logout') }}"
           style="color:#ff6b6b;"
           onclick="return confirm('Are you sure you want to logout?')">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h3>Facilities</h3>

        <div class="user" style="position: relative;">
            <img src="https://i.pravatar.cc/40"
                 style="width:35px; height:35px; border-radius:50%; cursor:pointer;"
                 onclick="toggleMenu()">

            <div id="profileMenu">
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#" style="color:#ff6b6b;">Logout</a>
            </div>
        </div>
    </div>

    <div class="content">

        <div class="table-container">

            <!-- TABLE HEADER -->
            <div class="table-header">

                <!-- LEFT: ADD BUTTON + CATEGORY FILTER -->
                <div style="display:flex; align-items:center; gap:12px;">

                    <button class="action-btn" onclick="openCreateModal()">
                        + Add Facility
                    </button>

                    <select id="categoryFilter" onchange="applyFilters()">
                        <option value="all">All Categories</option>
                        {% for c in categories %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>

                </div>

                <!-- RIGHT: SEARCH -->
                <div class="search-box">
                    <input type="text"
                           id="searchInput"
                           placeholder="Search facility..."
                           oninput="applyFilters()">
                </div>

            </div>

            <!-- TABLE -->
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Category</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Capacity</th>
                        <th>Price/hr</th>
                        <th>Status</th>
                        <th style="text-align:center;">Action</th>
                    </tr>
                </thead>
                <tbody id="facilityTableBody">
                    <!-- Populated by JS -->
                </tbody>
            </table>

        </div>

        <!-- PAGINATION — outside table container, same as inquiries.html -->
        <div class="pagination" id="pagination"></div>

        <br>

    </div><!-- /content -->

    <div class="footer">
        © 2026 Sports Complex Booking System
    </div>

    <!-- FACILITY MODAL -->
    <div id="facilityModal" class="modal">
        <div class="modal-content">

            <span class="close" onclick="closeModal()">&times;</span>

            <h3 id="modalTitle">Add Facility</h3>

            <form id="facilityForm" enctype="multipart/form-data">

                <input type="hidden" id="facilityId">

                <label>Category *</label>
                <select id="facilityCategory" required>
                    <option value="">Select Category</option>
                    {% for c in categories %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>

                <label>Name *</label>
                <input type="text" id="facilityName" required>

                <label>Description</label>
                <textarea id="facilityDescription"></textarea>

                <label>Image</label>
                <input type="file" id="facilityImage" accept="image/*">

                <img id="imagePreview"
                     style="margin-top:10px; max-width:100%; display:none; border-radius:8px;" />

                <label>Capacity</label>
                <input type="number" id="facilityCapacity">

                <label>Price per hour</label>
                <input type="number" id="facilityPrice">

                <label>Status</label>
                <select id="facilityStatus">
                    <option value="Available">Available</option>
                    <option value="Unavailable">Unavailable</option>
                    <option value="Maintenance">Maintenance</option>
                </select>

                <button type="submit" class="submit-btn">Save</button>

            </form>
        </div>
    </div>

</div><!-- /main -->

<script>
// =============================================
// STATE
// =============================================
let allFacilities = [];
let currentPage   = 1;
const rowsPerPage = 5;

const pagination = document.getElementById("pagination");

let searchValue   = "";
let categoryValue = "all";

// =============================================
// LOAD FACILITIES FROM SERVER
// =============================================
function loadFacilities() {
    fetch("/facilities_data")
        .then(res => res.json())
        .then(data => {
            allFacilities = data;
            currentPage   = 1;
            renderTable();
        })
        .catch(err => console.error("Failed to load facilities:", err));
}

// =============================================
// APPLY FILTERS
// =============================================
function applyFilters() {
    searchValue   = document.getElementById("searchInput").value.toLowerCase();
    categoryValue = document.getElementById("categoryFilter").value;
    currentPage   = 1;
    renderTable();
}

function getFilteredRows() {
    return allFacilities.filter(f => {
        const haystack = [
            f.id, f.category_name, f.name,
            f.description, f.capacity, f.price_per_hour, f.status
        ].join(" ").toLowerCase();

        const matchSearch   = !searchValue || haystack.includes(searchValue);
        const matchCategory = categoryValue === "all" || String(f.category_id) === categoryValue;

        return matchSearch && matchCategory;
    });
}

// =============================================
// RENDER TABLE ROWS
// =============================================
function renderTable() {
    const filtered  = getFilteredRows();
    const start     = (currentPage - 1) * rowsPerPage;
    const end       = start + rowsPerPage;
    const pageData  = filtered.slice(start, end);

    const tbody = document.getElementById("facilityTableBody");
    tbody.innerHTML = "";

    if (pageData.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="9" style="text-align:center; color:#6b85a6; padding:20px;">
                    No facilities found.
                </td>
            </tr>`;
    } else {
        pageData.forEach(f => {
            tbody.innerHTML += `
                <tr>
                    <td>${f.id}</td>
                    <td>
                        ${f.image
                            ? `<img src="/static/uploads/facilities/${f.image}"
                                    style="width:50px;height:50px;object-fit:cover;border-radius:6px;">`
                            : '-'}
                    </td>
                    <td>${f.category_name || '-'}</td>
                    <td>${f.name}</td>
                    <td>${f.description || '-'}</td>
                    <td>${f.capacity || '-'}</td>
                    <td>${f.price_per_hour ? '&#8369;' + parseFloat(f.price_per_hour).toFixed(2) : '-'}</td>
                    <td>${f.status}</td>
                    <td style="white-space:nowrap; text-align:center;">
                        <button class="action-btn"
                                onclick="openEditModal(${f.id})">
                            Edit
                        </button>
                        <button class="action-btn"
                                style="background:#ff6b6b; color:#fff;"
                                onclick="deleteFacility(${f.id})">
                            Delete
                        </button>
                    </td>
                </tr>`;
        });
    }

    renderPagination(filtered.length);
}

// =============================================
// PAGINATION — exact match to inquiries.html
// =============================================
function renderPagination(totalRows) {
    pagination.innerHTML = "";

    const totalPages = Math.ceil(totalRows / rowsPerPage) || 1;

    if (currentPage > totalPages) currentPage = 1;

    // PREV
    const prev = document.createElement("button");
    prev.innerHTML = "&lt;";
    prev.disabled  = currentPage === 1;
    prev.onclick   = () => {
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    };
    pagination.appendChild(prev);

    // PAGE NUMBERS
    for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.innerText = i;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => {
            currentPage = i;
            renderTable();
        };
        pagination.appendChild(btn);
    }

    // NEXT
    const next = document.createElement("button");
    next.innerHTML = "&gt;";
    next.disabled  = currentPage === totalPages;
    next.onclick   = () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
        }
    };
    pagination.appendChild(next);
}

// =============================================
// PAGE LOAD
// =============================================
window.onload = function () {
    loadFacilities();
};

// =============================================
// PROFILE MENU TOGGLE
// =============================================
function toggleMenu() {
    const menu = document.getElementById("profileMenu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

window.onclick = function (e) {
    if (!e.target.closest('.user')) {
        document.getElementById("profileMenu").style.display = "none";
    }
};

// =============================================
// MODAL OPEN / CLOSE
// =============================================
function openCreateModal() {
    document.getElementById("modalTitle").innerText = "Add Facility";
    document.getElementById("facilityForm").reset();
    document.getElementById("facilityId").value = "";
    document.getElementById("imagePreview").style.display = "none";
    document.getElementById("facilityModal").style.display = "block";
}

function closeModal() {
    document.getElementById("facilityModal").style.display = "none";
}

// =============================================
// OPEN EDIT MODAL
// =============================================
function openEditModal(id) {
    fetch(`/get_facility/${id}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("modalTitle").innerText          = "Edit Facility";
            document.getElementById("facilityId").value             = data.id;
            document.getElementById("facilityCategory").value       = data.category_id;
            document.getElementById("facilityName").value           = data.name;
            document.getElementById("facilityDescription").value    = data.description    || "";
            document.getElementById("facilityCapacity").value       = data.capacity       || "";
            document.getElementById("facilityPrice").value          = data.price_per_hour || "";
            document.getElementById("facilityStatus").value         = data.status;
            document.getElementById("facilityImage").value          = "";

            const preview = document.getElementById("imagePreview");
            if (data.image) {
                preview.src = "/static/uploads/facilities/" + data.image;
                preview.style.display = "block";
            } else {
                preview.style.display = "none";
            }

            document.getElementById("facilityModal").style.display = "block";
        });
}

// =============================================
// SAVE (CREATE + UPDATE)
// =============================================
document.getElementById("facilityForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const id        = document.getElementById("facilityId").value;
    const fileInput = document.getElementById("facilityImage");
    const formData  = new FormData();

    formData.append("category_id",    document.getElementById("facilityCategory").value);
    formData.append("name",           document.getElementById("facilityName").value);
    formData.append("description",    document.getElementById("facilityDescription").value);
    formData.append("capacity",       document.getElementById("facilityCapacity").value);
    formData.append("price_per_hour", document.getElementById("facilityPrice").value);
    formData.append("status",         document.getElementById("facilityStatus").value);

    if (fileInput.files.length > 0) {
        formData.append("image", fileInput.files[0]);
    }

    const url = id ? `/update_facility/${id}` : "/create_facility";

    fetch(url, { method: "POST", body: formData })
        .then(res => res.json())
        .then(res => {
            Swal.fire({
                title: "Success!",
                text: res.message,
                icon: "success",
                timer: 1500,
                showConfirmButton: false
            });
            closeModal();
            setTimeout(() => location.reload(), 800);
        })
        .catch(err => {
            Swal.fire("Error", "Something went wrong!", "error");
            console.error(err);
        });
});

// =============================================
// DELETE
// =============================================
function deleteFacility(id) {
    Swal.fire({
        title: "Are you sure?",
        text: "This facility will be permanently deleted.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#ff6b6b",
        cancelButtonColor: "#6b85a6",
        confirmButtonText: "Yes, delete it!"
    }).then(result => {
        if (result.isConfirmed) {
            fetch(`/delete_facility/${id}`, { method: "POST" })
                .then(res => res.json())
                .then(data => {
                    Swal.fire({
                        title: "Deleted!",
                        text: data.message,
                        icon: "success",
                        timer: 1200,
                        showConfirmButton: false
                    }).then(() => location.reload());
                });
        }
    });
}

// =============================================
// IMAGE PREVIEW
// =============================================
document.getElementById("facilityImage").addEventListener("change", function (e) {
    const file    = e.target.files[0];
    const preview = document.getElementById("imagePreview");
    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});
</script>

</body>
</html>
