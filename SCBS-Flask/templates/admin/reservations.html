<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reservations – Sports Complex Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI",Arial,sans-serif; }

body { display:flex; background:#0f1117; color:#e6f1ff; }

/* ── SIDEBAR ── */
.sidebar {
    width:230px; height:100vh;
    background:linear-gradient(180deg,#0f1117,#0a1f2e,#0c2d3f);
    position:fixed; display:flex; flex-direction:column;
    border-right:1px solid #1f2a38;
}
.sidebar-header { padding:15px; border-bottom:1px solid #1f2a38; color:#00e5ff; }
.menu { padding:20px 0; }
.menu a {
    display:flex; align-items:center; gap:12px; padding:10px 20px;
    color:#9fb3c8; text-decoration:none; font-size:14px; transition:0.3s;
}
.menu a:hover, .menu a.active {
    background:rgba(0,229,255,0.15); color:#00e5ff; border-left:3px solid #00e5ff;
}
.menu-title { padding:15px 20px 5px; font-size:11px; color:#6b85a6; text-transform:uppercase; }

/* ── MAIN ── */
.main { margin-left:230px; width:100%; }

.topbar {
    background:#0f1117; padding:12px 25px;
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid #1f2a38;
}
.topbar h3 { font-size:18px; color:#00e5ff; font-weight:600; }

#profileMenu {
    display:none; position:absolute; right:0; top:45px;
    background:#0f1722; border-radius:8px; border:1px solid #1f2a38; width:150px;
}
#profileMenu a { display:block; padding:10px; color:#cfe8ff; text-decoration:none; }
#profileMenu a:hover { background:rgba(0,229,255,0.1); }

/* ── CONTENT ── */
.content { padding:25px; }

/* ── TABLE CONTAINER ── */
.table-container {
    background:linear-gradient(145deg,#0f1117,#111827);
    border:1px solid #1f2a38; border-radius:12px; padding:20px;
}
.table-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:15px; flex-wrap:wrap; gap:10px;
}
.search-box input {
    padding:8px 12px; border-radius:6px; border:1px solid #1f2a38;
    background:#0a0f1a; color:#e6f1ff; outline:none; transition:0.3s;
    font-size:13px;
}
.search-box input:focus { border-color:#00e5ff; box-shadow:0 0 8px rgba(0,229,255,0.2); }
.search-box input::placeholder { color:#6b85a6; }

/* ── TABLE ── */
table { width:100%; border-collapse:collapse; }
thead { background:#0a1f2e; }
th { color:#00e5ff; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
th, td { padding:11px 10px; font-size:13px; text-align:left; }
tbody tr { border-top:1px solid #1f2a38; transition:0.2s; }
tbody tr:hover { background:rgba(0,229,255,0.04); }

/* ── STATUS BADGE ── */
.status-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700;
}
.s-Pending   { background:#451a03; color:#fbbf24; }
.s-Approved  { background:#052e16; color:#34d399; }
.s-Rejected  { background:#450a0a; color:#f87171; }
.s-Cancelled { background:#1c1c1e; color:#9ca3af; }

/* ── BUTTONS ── */
.btn {
    padding:5px 12px; border:none; border-radius:6px;
    cursor:pointer; font-size:12px; font-weight:600;
    transition: opacity 0.2s;
}
.btn:hover { opacity:0.82; }
.btn-view   { background:#0e7490; color:#fff; }
.btn-update { background:#1d4ed8; color:#fff; }
.btn-delete { background:#b91c1c; color:#fff; }

/* ── FOOTER ── */
.footer { text-align:center; padding:12px; font-size:12px; color:#6b85a6; }

@media(max-width:600px){ .sidebar{display:none;} .main{margin-left:0;} }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-header"><h2>SCBS - Admin</h2></div>
    <div class="menu">
        <a href="{{ url_for('dashboard') }}"    class="{% if active_page=='dashboard'    %}active{% endif %}"><i class="fas fa-home"></i> Dashboard</a>
        <a href="{{ url_for('reservations') }}" class="{% if active_page=='reservations' %}active{% endif %}"><i class="fas fa-calendar-check"></i> Reservations</a>
        <div class="menu-title">Management</div>
        <a href="{{ url_for('categories') }}"   class="{% if active_page=='categories'   %}active{% endif %}"><i class="fas fa-layer-group"></i> Categories</a>
        <a href="{{ url_for('facilities') }}"   class="{% if active_page=='facilities'   %}active{% endif %}"><i class="fas fa-building"></i> Facilities</a>
        <a href="{{ url_for('users') }}"        class="{% if active_page=='users'        %}active{% endif %}"><i class="fas fa-users"></i> Users</a>
        <a href="{{ url_for('inquiries') }}"    class="{% if active_page=='inquiries'    %}active{% endif %}"><i class="fas fa-envelope"></i> Inquiries</a>
        <div class="menu-title">Logs</div>
        <a href="{{ url_for('history_log') }}"  class="{% if active_page=='history_log'  %}active{% endif %}"><i class="fas fa-history"></i> History Log</a>
        <div class="menu-title">Account</div>
        <a href="{{ url_for('logout') }}" style="color:#ff6b6b;"
           onclick="return confirm('Are you sure you want to logout?')">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h3>Reservations</h3>
        <div class="user" style="position:relative;">
            <img src="https://i.pravatar.cc/40"
                 style="width:35px;height:35px;border-radius:50%;cursor:pointer;"
                 onclick="toggleMenu()">
            <div id="profileMenu">
                <a href="#">Profile</a>
                <a href="{{ url_for('logout') }}" style="color:#ff6b6b;">Logout</a>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="table-container">

            <div class="table-header">
                <select id="statusFilter"
                        style="padding:8px 12px;border-radius:6px;border:1px solid #1f2a38;
                               background:#0a0f1a;color:#e6f1ff;font-size:13px;cursor:pointer;">
                    <option value="all">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search reservations…">
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Facility</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="reservationTable"></tbody>
            </table>

        </div>
    </div>

    <div class="footer">© 2026 Sports Complex Booking System</div>
</div>


<script>
/* ── PROFILE MENU ── */
function toggleMenu() {
    const m = document.getElementById("profileMenu");
    m.style.display = m.style.display === "block" ? "none" : "block";
}
window.onclick = e => {
    if (!e.target.closest('.user'))
        document.getElementById("profileMenu").style.display = "none";
};

/* ── INIT ── */
document.addEventListener("DOMContentLoaded", () => {
    loadReservations();
    document.getElementById("statusFilter").addEventListener("change", loadReservations);
    document.getElementById("searchInput").addEventListener("keyup",   loadReservations);
});

/* ── STATUS HELPERS ── */
function statusClass(s) {
    return { Pending:'s-Pending', Approved:'s-Approved',
             Rejected:'s-Rejected', Cancelled:'s-Cancelled' }[s] || 's-Pending';
}

const STATUS_COLORS = {
    Approved:  { bg:'#052e16', color:'#34d399', dot:'#10b981' },
    Rejected:  { bg:'#450a0a', color:'#f87171', dot:'#ef4444' },
    Cancelled: { bg:'#1c1c1e', color:'#9ca3af', dot:'#6b7280' },
    Pending:   { bg:'#451a03', color:'#fbbf24', dot:'#f59e0b' },
};

/* ── LOAD TABLE ── */
function loadReservations() {
    const filter = document.getElementById("statusFilter").value;
    const search = document.getElementById("searchInput").value.toLowerCase();
    const tbody  = document.getElementById("reservationTable");

    fetch("/get_reservations")
    .then(r => r.json())
    .then(data => {

        const filtered = data.filter(r => {
            const matchStatus = filter === "all" || r.status === filter;
            const matchSearch = Object.values(r).join(" ").toLowerCase().includes(search);
            return matchStatus && matchSearch;
        });

        if (!filtered.length) {
            tbody.innerHTML = `
                <tr><td colspan="8"
                    style="text-align:center;padding:50px;color:#6b85a6;font-size:13px;">
                    No reservations found.
                </td></tr>`;
            return;
        }

        tbody.innerHTML = filtered.map(r => `
            <tr>
                <td style="color:#6b85a6;font-size:12px;">#${r.id}</td>

                <td>
                    <div style="font-weight:600;color:#e2e8f0;">${r.user_name || 'N/A'}</div>
                    <div style="font-size:11px;color:#6b85a6;">${r.user_email || ''}</div>
                </td>

                <td style="color:#cbd5e1;">${r.facility_name || '—'}</td>
                <td style="color:#94a3b8;font-size:12px;">${r.booking_date}</td>
                <td style="font-size:12px;color:#94a3b8;">${r.start_time} – ${r.end_time}</td>
                <td style="font-weight:600;color:#e2e8f0;">₱${parseFloat(r.total_amount||0).toFixed(2)}</td>

                <td>
                    <span class="status-badge ${statusClass(r.status)}">
                        ${r.status}
                    </span>
                </td>

                <td>
                    <button class="btn btn-view"
                            onclick='viewReservation(${JSON.stringify(r)})'>View</button>
                    <button class="btn btn-update"
                            onclick="updateStatus(${r.id}, '${r.status}', '${(r.user_name||'').replace(/'/g,"\\'")}')">Update</button>
                    <button class="btn btn-delete"
                            onclick="deleteReservation(${r.id})">Delete</button>
                </td>
            </tr>`).join('');
    })
    .catch(() => {
        tbody.innerHTML = `
            <tr><td colspan="8"
                style="text-align:center;padding:30px;color:#f87171;font-size:13px;">
                Failed to load reservations. Please refresh the page.
            </td></tr>`;
    });
}

/* ── VIEW MODAL ── */
function viewReservation(r) {

    const facilityImg = r.facility_image
        ? `/static/uploads/facilities/${r.facility_image}`
        : `/static/uploads/facilities/default.png`;

    const paymentImg = r.payment_screenshot
        ? `/static/uploads/payments/${r.payment_screenshot.trim()}`
        : null;

    const sc = STATUS_COLORS[r.status] || STATUS_COLORS.Pending;

    /* reusable info card */
    const card = (title, rows) => `
        <div style="background:#0a1622;border:1px solid #1f2a38;border-radius:12px;padding:16px;">
            <p style="font-size:11px;font-weight:700;color:#00e5ff;text-transform:uppercase;
                      letter-spacing:0.6px;margin-bottom:12px;padding-bottom:8px;
                      border-bottom:1px solid #1f2a38;">
                ${title}
            </p>
            ${rows.map(([label, value]) => `
                <div style="display:flex;justify-content:space-between;align-items:center;
                            padding:6px 0;border-bottom:1px solid #0f1722;">
                    <span style="font-size:12px;color:#6b85a6;">${label}</span>
                    <span style="font-size:13px;font-weight:600;color:#e2e8f0;text-align:right;max-width:60%;">${value}</span>
                </div>`).join('')}
        </div>`;

    Swal.fire({
        title: '',
        width: 820,
        background: '#0f1117',
        color: '#e2e8f0',
        showConfirmButton: false,
        showCloseButton: true,

        html: `
        <div style="font-family:'Segoe UI',Arial,sans-serif;text-align:left;">

            <!-- HERO -->
            <div style="position:relative;margin:-20px -20px 20px;
                        border-radius:12px 12px 0 0;overflow:hidden;">
                <img src="${facilityImg}"
                     onerror="this.src='/static/uploads/facilities/default.png'"
                     style="width:100%;height:190px;object-fit:cover;display:block;">
                <div style="position:absolute;inset:0;
                            background:linear-gradient(to top,rgba(10,14,20,0.95) 0%,
                                                              rgba(10,14,20,0.3) 60%,
                                                              transparent 100%);">
                </div>
                <div style="position:absolute;bottom:0;left:0;right:0;
                            padding:16px 20px;display:flex;
                            justify-content:space-between;align-items:flex-end;">
                    <div>
                        <p style="font-size:10px;color:#94a3b8;margin-bottom:3px;
                                  text-transform:uppercase;letter-spacing:1px;">Facility</p>
                        <h2 style="font-size:19px;font-weight:700;color:#fff;margin:0;">
                            ${r.facility_name || 'N/A'}
                        </h2>
                    </div>
                    <span style="background:${sc.bg};color:${sc.color};
                                 padding:5px 14px;border-radius:999px;font-size:12px;
                                 font-weight:700;border:1px solid ${sc.dot};white-space:nowrap;">
                        <span style="display:inline-block;width:7px;height:7px;
                                     border-radius:50%;background:${sc.dot};
                                     margin-right:5px;vertical-align:middle;"></span>
                        ${r.status}
                    </span>
                </div>
            </div>

            <!-- REF BAR -->
            <div style="display:flex;justify-content:space-between;align-items:center;
                        background:#0a1622;border:1px solid #1f2a38;border-radius:8px;
                        padding:10px 16px;margin-bottom:16px;">
                <span style="font-size:12px;color:#6b85a6;">
                    Booking <strong style="color:#00e5ff;">#${r.id}</strong>
                </span>
                <span style="font-size:12px;color:#6b85a6;">
                    Submitted: <strong style="color:#94a3b8;">
                        ${r.date_created ? r.date_created.split('T')[0] : 'N/A'}
                    </strong>
                </span>
            </div>

            <!-- INFO GRID -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">

                ${card('Customer Info', [
                    ['Name',  r.user_name  || 'N/A'],
                    ['Email', r.user_email || 'N/A'],
                    ['Phone', r.user_phone || 'N/A'],
                ])}

                ${card('Booking Details', [
                    ['Date',    r.booking_date],
                    ['Time',    `${r.start_time} – ${r.end_time}`],
                    ['Purpose', r.purpose || 'N/A'],
                ])}

                ${card('Payment Summary', [
                    ['Total Amount', `₱${parseFloat(r.total_amount||0).toFixed(2)}`],
                    ['Deposit Paid', `₱${parseFloat(r.deposit_amount||0).toFixed(2)}`],
                    ['Balance Due',  `₱${(parseFloat(r.total_amount||0) - parseFloat(r.deposit_amount||0)).toFixed(2)}`],
                ])}

                ${card('GCash Payment', [
                    ['Method',    r.payment_method || 'GCash'],
                    ['Reference', r.gcash_reference || 'N/A'],
                    ['Screenshot', `<button onclick="toggleScreenshot()"
                        id="toggleBtn"
                        style="background:#0e2233;color:#00e5ff;border:1px solid #1f2a38;
                               padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;">
                        View
                    </button>`],
                ])}

            </div>

            <!-- SCREENSHOT -->
            <div id="screenshotBox"
                 style="display:none;margin-bottom:14px;border:1px solid #1f2a38;border-radius:12px;overflow:hidden;">
                ${paymentImg
                    ? `<img src="${paymentImg}"
                            onerror="this.parentElement.innerHTML='<p style=\\'text-align:center;padding:20px;color:#6b85a6;\\'>Screenshot not found.</p>'"
                            style="width:100%;max-height:280px;object-fit:contain;display:block;background:#0a0f1a;">`
                    : `<p style="text-align:center;padding:24px;color:#6b85a6;font-size:13px;">
                           No payment screenshot uploaded.
                       </p>`
                }
            </div>

            <!-- ACTIONS -->
            <div style="display:flex;gap:10px;margin-top:4px;">
                <button onclick="Swal.close(); updateStatus(${r.id}, '${r.status}',
                                 '${(r.user_name||'').replace(/'/g,"\\'")}');"
                        style="flex:1;padding:11px;border:none;border-radius:10px;
                               background:#1d4ed8;color:#fff;font-weight:700;
                               cursor:pointer;font-size:13px;letter-spacing:0.3px;">
                    Update Status
                </button>
                <button onclick="Swal.close(); deleteReservation(${r.id});"
                        style="padding:11px 20px;border:none;border-radius:10px;
                               background:#7f1d1d;color:#fca5a5;font-weight:700;
                               cursor:pointer;font-size:13px;">
                    Delete
                </button>
            </div>

        </div>`
    });
}

function toggleScreenshot() {
    const box = document.getElementById('screenshotBox');
    const btn = document.getElementById('toggleBtn');
    if (!box) return;
    const visible = box.style.display !== 'none';
    box.style.display = visible ? 'none' : 'block';
    btn.textContent   = visible ? 'View' : 'Hide';
}

/* ── UPDATE STATUS ── */
function updateStatus(id, currentStatus, userName) {

    Swal.fire({
        title: 'Update Status',
        background: '#0f1117',
        color: '#e2e8f0',
        input: 'select',
        inputOptions: {
            Pending:   'Pending',
            Approved:  'Approved',
            Rejected:  'Rejected',
            Cancelled: 'Cancelled'
        },
        inputValue: currentStatus,
        inputAttributes: {
            style: 'background:#0a1622;color:#e2e8f0;border:1px solid #1f2a38;' +
                   'border-radius:8px;padding:10px;font-size:14px;'
        },
        html: `<p style="color:#94a3b8;font-size:13px;margin-bottom:10px;">
                   Customer: <strong style="color:#e2e8f0;">${userName}</strong><br>
                   <span style="font-size:12px;">
                       An email notification will be sent to the customer automatically.
                   </span>
               </p>`,
        showCancelButton: true,
        confirmButtonText: 'Update',
        cancelButtonText:  'Cancel',
        confirmButtonColor: '#1d4ed8',
        cancelButtonColor:  '#374151',
    }).then(first => {

        if (!first.isConfirmed) return;
        const newStatus = first.value;

        Swal.fire({
            title: 'Confirm Update',
            html: `Change status to <strong style="color:#00e5ff;">${newStatus}</strong>?<br>
                   <span style="font-size:12px;color:#94a3b8;">
                       The customer will be notified by email.
                   </span>`,
            icon: 'question',
            background: '#0f1117',
            color: '#e2e8f0',
            showCancelButton: true,
            confirmButtonText: 'Yes, Update',
            cancelButtonText:  'Cancel',
            confirmButtonColor: '#059669',
            cancelButtonColor:  '#374151',
        }).then(second => {

            if (!second.isConfirmed) return;

            const formData = new FormData();
            formData.append('status', newStatus);

            fetch(`/update_reservation_status/${id}`, { method:'POST', body:formData })
            .then(r => r.json())
            .then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Status Updated',
                    html: `Status changed to <strong>${newStatus}</strong>.<br>
                           <span style="font-size:12px;color:#6b7280;">
                               Email notification sent to the customer.
                           </span>`,
                    background: '#0f1117',
                    color: '#e2e8f0',
                    confirmButtonColor: '#059669',
                    timer: 3000,
                    timerProgressBar: true,
                });
                loadReservations();
            })
            .catch(() => Swal.fire('Error', 'Failed to update status.', 'error'));
        });
    });
}

/* ── DELETE ── */
function deleteReservation(id) {
    Swal.fire({
        title: 'Delete Reservation?',
        text: 'This action cannot be undone.',
        icon: 'warning',
        background: '#0f1117',
        color: '#e2e8f0',
        showCancelButton: true,
        confirmButtonColor: '#b91c1c',
        cancelButtonColor:  '#374151',
        confirmButtonText: 'Yes, Delete',
        cancelButtonText:  'Cancel',
    }).then(res => {
        if (!res.isConfirmed) return;
        fetch(`/delete_reservation/${id}`, { method:'POST' })
        .then(() => {
            Swal.fire({
                icon: 'success',
                title: 'Deleted',
                text: 'Reservation removed successfully.',
                background: '#0f1117',
                color: '#e2e8f0',
                confirmButtonColor: '#059669',
                timer: 2500,
                timerProgressBar: true,
            });
            loadReservations();
        });
    });
}
</script>
</body>
</html>
