<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Complex Booking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    display: flex;
    background: #0f1117;
    color: #e6f1ff;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #0f1117, #0a1f2e, #0c2d3f);
    position: fixed;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1f2a38;
}

.sidebar-header {
    padding: 15px;
    border-bottom: 1px solid #1f2a38;
    color: #00e5ff;
}

.menu {
    padding: 20px 0;
    flex-grow: 1;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    color: #9fb3c8;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.menu a:hover,
.menu a.active {
    background: rgba(0, 229, 255, 0.15);
    color: #00e5ff;
    border-left: 3px solid #00e5ff;
}

.menu-title {
    padding: 15px 20px 5px;
    font-size: 11px;
    color: #6b85a6;
    text-transform: uppercase;
}

/* MAIN */
.main {
    margin-left: 230px;
    width: 100%;
}

/* TOPBAR */
.topbar {
    background: #0f1117;
    padding: 12px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2a38;
}

.topbar h3 {
    font-size: 18px;
    color: #00e5ff;
}

/* PROFILE MENU */
#profileMenu {
    display:none;
    position:absolute;
    right:0;
    top:45px;
    background:#0f1722;
    border-radius:8px;
    border:1px solid #1f2a38;
    width:150px;
}

#profileMenu a {
    display:block;
    padding:10px;
    color:#cfe8ff;
    text-decoration:none;
}

#profileMenu a:hover {
    background: rgba(0,229,255,0.1);
}


/* CONTENT */
.content {
    padding: 25px;
}

/* TABLE CONTAINER */
.table-container {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 20px;
}

/* HEADER */
.table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.table-header h4 {
    color: #00e5ff;
}

/* SEARCH */
.search-box input {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
    outline: none;
    transition: 0.3s;
}

.search-box input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 8px rgba(0,229,255,0.3);
}

.search-box input::placeholder {
    color: #6b85a6;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #0a1f2e;
}

th {
    color: #00e5ff;
    font-weight: 500;
}

th, td {
    padding: 10px;
    font-size: 13px;
    text-align: left;
}

tbody tr {
    border-top: 1px solid #1f2a38;
    transition: 0.2s;
}

tbody tr:hover {
    background: rgba(0, 229, 255, 0.08);
}

/* ACTION BUTTON */
.action-btn {
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    color: #001018;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
}



.action-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 35px;
    background: #0f1722;
    border: 1px solid #1f2a38;
    border-radius: 8px;
    width: 130px;
}

.action-menu button {
    width: 100%;
    padding: 8px;
    background: none;
    border: none;
    color: #cfe8ff;
    text-align: left;
    cursor: pointer;
}

.action-menu button:hover {
    background: rgba(0,229,255,0.1);
}

.action-menu button.delete {
    color: #ff6b6b;
}

/* EMPTY STATE */
.empty-state {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    color: #6b85a6;
}

.empty-state i {
    font-size: 40px;
    color: #00e5ff;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #6b85a6;
}

/* RESPONSIVE */
@media(max-width: 600px){
    .sidebar { display: none; }
    .main { margin-left: 0; }
}

.profile-img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    object-fit: cover;
}

.modal {
    display: none;
    position: absolute; /* CHANGE from fixed → absolute */
    top: 0;
    left: 0;
    width: 100%;
    min-height: 100vh; /* allow it to grow with page */
    background: rgba(0,0,0,0.6);
    z-index: 999;

    /* allow page scroll */
    pointer-events: auto;
}

.modal-content {
    background: linear-gradient(145deg, #0f1722, #111827);
    border: 1px solid #1f2a38;

    width: 420px;
    max-width: 90%;

    margin: 80px auto; /* spacing from top instead of % */

    padding: 25px;
    border-radius: 12px;
    color: #e6f1ff;
    box-shadow: 0 0 20px rgba(0,229,255,0.1);
    animation: fadeIn 0.3s ease;
}

.modal-content h3 {
    margin-bottom: 15px;
    color: #00e5ff;
}

.modal-content label {
    font-size: 13px;
    color: #9fb3c8;
}

.modal-content input,
.modal-content textarea,
.modal-content select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
}

.modal-content input:focus,
.modal-content textarea:focus,
.modal-content select:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 6px rgba(0,229,255,0.3);
}

.submit-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    border-radius: 6px;
    color: #001018;
    font-weight: bold;
    cursor: pointer;
}

.close {
    float: right;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<!-- ADD THIS BEFORE </body> -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


<!-- USER MODAL -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeUserModal()">&times;</span>

        <h3 id="modalTitle">Add User</h3>

        <input type="hidden" id="user_id">

        <label>Name</label>
        <input type="text" id="user_name">

        <label>Email</label>
        <input type="email" id="user_email">

        <label>Address</label>
        <input type="text" id="user_address">

        <label>Phone</label>
        <input type="text" id="user_phone">

        <label>Role</label>
        <select id="user_role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <label>Status</label>
        <select id="user_status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="banned">Banned</option>
        </select>

        <label>Profile Image</label>
        <!-- ✅ FIXED ID (must match JS) -->
        <input type="file" id="user_profile_image" accept="image/*">

        <!-- ✅ Preview Image -->
        <img id="previewImage" 
             style="width:80px; height:80px; border-radius:50%; display:none; margin-bottom:10px; object-fit:cover;">

        <button class="submit-btn" onclick="saveUser()">Save User</button>
    </div>
</div>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="sidebar-header">
        <h2>SCBS - Admin</h2>
    </div>

    <div class="menu">

        <a href="{{ url_for('dashboard') }}"
        class="{% if active_page == 'dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> Dashboard
        </a>

        <a href="{{ url_for('reservations') }}"
        class="{% if active_page == 'reservations' %}active{% endif %}">
            <i class="fas fa-calendar-check"></i> Reservations
        </a>

        <div class="menu-title">Management</div>

        <a href="{{ url_for('categories') }}"
        class="{% if active_page == 'categories' %}active{% endif %}">
            <i class="fas fa-layer-group"></i> Categories
        </a>

        <a href="{{ url_for('facilities') }}"
        class="{% if active_page == 'facilities' %}active{% endif %}">
            <i class="fas fa-building"></i> Facilities
        </a>

        <a href="{{ url_for('users') }}"
        class="{% if active_page == 'users' %}active{% endif %}">
            <i class="fas fa-users"></i> Users
        </a>

        <a href="{{ url_for('inquiries') }}"
        class="{% if active_page == 'inquiries' %}active{% endif %}">
            <i class="fas fa-envelope"></i> Inquiries
        </a>

        <div class="menu-title">Logs</div>
        <a href="{{ url_for('sales') }}" class="{% if active_page=='sales' %}active{% endif %}">
            <i class="fas fa-chart-line"></i> Sales
        </a>
        <a href="{{ url_for('history_log') }}" class="{% if active_page == 'history_log' %}active{% endif %}">
            <i class="fas fa-history"></i> History Log
        </a>
        <div class="menu-title">Account</div>

        <a href="{{ url_for('logout') }}"
           style="color:#ff6b6b;"
           onclick="return confirm('Are you sure you want to logout?')">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>

    </div>

</div>
<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h3>Users</h3>

        <div class="user" style="position: relative;">
            <img src="https://i.pravatar.cc/40" 
                style="width:35px; height:35px; border-radius:50%; cursor:pointer;" 
                onclick="toggleMenu()">

            <div id="profileMenu">
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#" style="color:#ff6b6b;">Logout</a>
            </div>
        </div>
    </div>

    <div class="content">

        <div class="table-container">

            <div class="table-header" style="display:flex; justify-content:space-between; align-items:center;">

                <!-- LEFT -->
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="action-btn" onclick="addUser()">
                        + Add User
                    </button>
                </div>

                <!-- RIGHT -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search users...">
                </div>

            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Profile</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Address</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="userTableBody">
                    <!-- DATA WILL LOAD HERE -->
                </tbody>
            </table>

        </div>

    </div>

    <div class="footer">
        © 2026 Sports Complex Booking System
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
let usersData = [];

// ======================
// LOAD USERS
// ======================
function loadUsers() {
    fetch('/get_users')
    .then(res => res.json())
    .then(data => {
        usersData = data;
        renderTable(data);
    });
}


// ======================
// RENDER TABLE
// ======================
function renderTable(data) {
    const tbody = document.getElementById("userTableBody");
    tbody.innerHTML = "";

    if (data.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="9" style="text-align:center; color:#6b85a6;">
                    No users found
                </td>
            </tr>
        `;
        return;
    }

    data.forEach(user => {

        const profileImg = user.profile_image 
            ? user.profile_image 
            : "/static/default.png";

        tbody.innerHTML += `
            <tr>
                <td>${user.id}</td>

                <!-- PROFILE -->
                <td>
                    <img src="${profileImg}" 
                         style="width:35px; height:35px; border-radius:50%; object-fit:cover;">
                </td>

                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.address ?? '-'}</td>
                <td>${user.phone ?? '-'}</td>
                <td>${user.role ?? '-'}</td>
                <td>${user.status ?? '-'}</td>

                <!-- ACTION -->
                <td style="text-align:center; white-space:nowrap;">

                    <button class="action-btn"
                            onclick="editUser(${user.id})">
                        Edit
                    </button>

                    <button class="action-btn" style="background:#ff6b6b; color:#fff;"
                            onclick="deleteUser(${user.id})">
                        Delete
                    </button>

                </td>
            </tr>
        `;
    });
}


// ======================
// OPEN ADD MODAL
// ======================
function addUser() {
    document.getElementById("modalTitle").innerText = "Add User";
    document.getElementById("user_id").value = "";

    document.getElementById("user_name").value = "";
    document.getElementById("user_email").value = "";
    document.getElementById("user_address").value = "";
    document.getElementById("user_phone").value = "";
    document.getElementById("user_role").value = "user";
    document.getElementById("user_status").value = "active";

    document.getElementById("previewImage").style.display = "none";

    document.getElementById("userModal").style.display = "block";
}


// ======================
// OPEN EDIT MODAL
// ======================
function editUser(id) {
    fetch(`/get_user/${id}`)
    .then(res => res.json())
    .then(user => {

        document.getElementById("modalTitle").innerText = "Edit User";
        document.getElementById("user_id").value = user.id;

        document.getElementById("user_name").value = user.name;
        document.getElementById("user_email").value = user.email;
        document.getElementById("user_address").value = user.address || "";
        document.getElementById("user_phone").value = user.phone || "";
        document.getElementById("user_role").value = user.role || "user";
        document.getElementById("user_status").value = user.status || "active";

        // preview image
        if (user.profile_image) {
            document.getElementById("previewImage").src = user.profile_image;
            document.getElementById("previewImage").style.display = "block";
        }

        document.getElementById("userModal").style.display = "block";
    });
}


// ======================
// IMAGE PREVIEW
// ======================
document.getElementById("user_profile_image").addEventListener("change", function(e) {
    const file = e.target.files[0];

    if (file) {
        const preview = document.getElementById("previewImage");
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});


// ======================
// SAVE USER
// ======================
function saveUser() {
    const id = document.getElementById("user_id").value;

    const formData = new FormData();

    formData.append("name", document.getElementById("user_name").value);
    formData.append("email", document.getElementById("user_email").value);
    formData.append("address", document.getElementById("user_address").value);
    formData.append("phone", document.getElementById("user_phone").value);
    formData.append("role", document.getElementById("user_role").value);
    formData.append("status", document.getElementById("user_status").value);

    // ✅ GET ACTUAL FILE (NOT preview src)
    const fileInput = document.getElementById("user_profile_image");
    if (fileInput.files.length > 0) {
        formData.append("profile_image", fileInput.files[0]);
    }

    const url = id ? `/update_user/${id}` : `/create_user`;

    fetch(url, {
        method: "POST",
        body: formData   // ❌ NO headers needed
    })
    .then(res => res.json())
    .then(() => {
        closeUserModal();
        loadUsers();
    })
    .catch(err => console.error("Error:", err));
}

// ======================
// CLOSE MODAL
// ======================
function closeUserModal() {
    document.getElementById("userModal").style.display = "none";
}

// ======================
// DELETE USER (SWEETALERT)
// ======================
function deleteUser(id) {
    Swal.fire({
        title: 'Are you sure?',
        text: "This user will be deleted!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#00e5ff',
        cancelButtonColor: '#ff6b6b',
        confirmButtonText: 'Yes, delete it!'
    }).then((result) => {
        if (result.isConfirmed) {

            fetch(`/delete_user/${id}`, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(() => {
                Swal.fire('Deleted!', 'User has been deleted.', 'success');
                loadUsers();
            });
        }
    });
}


// ======================
// SEARCH (ENHANCED)
// ======================
document.getElementById("searchInput").addEventListener("keyup", function () {
    const value = this.value.toLowerCase().trim();

    const filtered = usersData.filter(user => {
        return (
            (user.name || "").toLowerCase().includes(value) ||
            (user.email || "").toLowerCase().includes(value) ||
            (user.phone || "").toLowerCase().includes(value) ||
            (user.role || "").toLowerCase().includes(value) ||
            (user.status || "").toLowerCase().includes(value) ||
            (user.address || "").toLowerCase().includes(value)
        );
    });

    renderTable(filtered);
});

// ======================
// LOAD ON START
// ======================
document.addEventListener("DOMContentLoaded", loadUsers);
</script>

</body>
</html>
