<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f1117, #0a1f2e, #0c2d3f);
    overflow: hidden;
    position: relative;
    color: #e6f1ff;
}

/* BACKGROUND GLOW */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(0, 229, 255, 0.15);
    border-radius: 50%;
    top: -100px;
    left: -100px;
    filter: blur(80px);
}

body::after {
    content: "";
    position: absolute;
    width: 350px;
    height: 350px;
    background: rgba(0, 207, 255, 0.12);
    border-radius: 50%;
    bottom: -120px;
    right: -100px;
    filter: blur(80px);
}

/* LOGIN CONTAINER */
.login-container {
    position: relative;
    width: 400px;
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 18px;
    padding: 40px 35px;
    box-shadow: 0 0 25px rgba(0, 229, 255, 0.08);
    z-index: 10;
    backdrop-filter: blur(10px);
}

/* LOGO */
.logo {
    width: 85px;
    height: 85px;
    margin: 0 auto 20px;
    border-radius: 18px;
    background: linear-gradient(135deg, #00cfff, #00e5ff);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #001018;
    font-size: 34px;
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
}

/* TITLE */
.login-header {
    text-align: center;
    margin-bottom: 30px;
}

.login-header h2 {
    color: #00e5ff;
    font-size: 28px;
    margin-bottom: 8px;
}

.login-header p {
    color: #9fb3c8;
    font-size: 14px;
}

/* INPUT GROUP */
.input-group {
    margin-bottom: 22px;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    color: #9fb3c8;
}

.input-box {
    position: relative;
}

.input-box i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #00e5ff;
    font-size: 14px;
}

.input-box input {
    width: 100%;
    padding: 14px 14px 14px 45px;
    border-radius: 12px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

.input-box input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 12px rgba(0,229,255,0.25);
}

.input-box input::placeholder {
    color: #6b85a6;
}

/* OPTIONS */
.login-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    font-size: 13px;
}

.login-options label {
    color: #9fb3c8;
}

.login-options a {
    color: #00e5ff;
    text-decoration: none;
}

.login-options a:hover {
    text-decoration: underline;
}

/* BUTTON */
.login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    color: #001018;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 18px rgba(0,229,255,0.35);
}

/* FOOTER */
.login-footer {
    margin-top: 25px;
    text-align: center;
    font-size: 13px;
    color: #6b85a6;
}

/* RESPONSIVE */
@media(max-width: 480px) {
    .login-container {
        width: 92%;
        padding: 30px 25px;
    }
}
</style>
</head>
<body>

<div class="login-container">

    <!-- LOGO -->
    <div class="logo">
        <i class="fas fa-user-shield"></i>
    </div>

    <!-- HEADER -->
    <div class="login-header">
        <h2>Admin Login</h2>
        <p>Secure access to the administration panel</p>
    </div>

    <!-- FORM -->
    <form method="POST">

        <!-- EMAIL -->
        <div class="input-group">
            <label>Email Address</label>

            <div class="input-box">
                <i class="fas fa-envelope"></i>

                <input 
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            </div>
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
            <label>Password</label>

            <div class="input-box">
                <i class="fas fa-lock"></i>

                <input 
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>
        </div>

        <!-- OPTIONS -->
        <div class="login-options">

            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>

        </div>

        <!-- BUTTON -->
        <button type="submit" class="login-btn">
            Login to Dashboard
        </button>

    </form>

    <!-- FOOTER -->
    <div class="login-footer">
        © 2026 Admin Panel System
    </div>

</div>

<!-- SWEETALERT ERROR -->
{% if error %}
<script>
Swal.fire({
    icon: 'error',
    title: 'Login Failed',
    text: '{{ error }}',
    background: '#111827',
    color: '#e6f1ff',
    confirmButtonColor: '#00e5ff'
});
</script>
{% endif %}

<!-- SWEETALERT SUCCESS -->
{% if success %}
<script>
Swal.fire({
    icon: 'success',
    title: 'Success',
    text: '{{ success }}',
    background: '#111827',
    color: '#e6f1ff',
    confirmButtonColor: '#00e5ff'
});
</script>
{% endif %}

</body>
</html>
