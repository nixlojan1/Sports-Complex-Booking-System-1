<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --dark: #205072;
            --teal: #329D9C;
            --green: #56C596;
            --light-green: #7BE495;
            --mint: #CFF4D2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--mint), #ffffff);
        }

body {
    background: linear-gradient(135deg, var(--mint), #ffffff);
    min-height: 100vh;
}

/* REMOVE vertical centering */
body {
    display: block; /* important fix */
}

        /* ================= NAVBAR ================= */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 60px;
            background: var(--dark);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--light-green);
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-login {
            border: 1px solid var(--light-green);
            color: var(--light-green);
        }

        .btn-login:hover {
            background: var(--light-green);
            color: var(--dark);
        }

        .btn-signup {
            background: var(--green);
            color: white;
        }

        .btn-signup:hover {
            background: var(--light-green);
            color: var(--dark);
        }
/* ================= FORM WRAPPER ================= */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px); /* keeps center BELOW navbar */
    padding: 30px 15px;
}

        /* ================= LOGIN BOX ================= */
        .box {
            width: 400px;
            padding: 40px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        /* ================= TOGGLE ================= */
        .toggle {
            display: flex;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            background: #f1f5f4;
        }

        .toggle button {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: #666;
            font-size: 14px;
            transition: 0.3s;
        }

        .toggle button.active {
            background: var(--teal);
            color: white;
        }

        /* ================= INPUT ================= */
        .inputBox {
            position: relative;
            margin-bottom: 25px;
        }

        .inputBox input {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .inputBox input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(50, 157, 156, 0.15);
        }

        .inputBox label {
            position: absolute;
            top: -10px;
            left: 10px;
            background: white;
            padding: 0 5px;
            font-size: 12px;
            color: var(--dark);
        }

        /* ================= TERMS ================= */
        .terms {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
        }

        .terms input {
            accent-color: var(--green);
        }

        .terms a {
            color: var(--teal);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* ================= BUTTON ================= */
        .box form input[type="submit"] {
            width: 100%;
            background: var(--teal);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .box form input[type="submit"]:hover {
            background: var(--dark);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }
        }

        /* FOOTER */
        .footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
    <div class="logo">
        <i class="fas fa-dumbbell"></i> Sports Complex
    </div>

    <div class="nav-links">
            <a href="{{ url_for('index') }}#home">Home</a>
            <a href="{{ url_for('index') }}#about">About</a>
            <a href="{{ url_for('index') }}#pricing">Pricing</a>
            <a href="{{ url_for('index') }}#facilities">Facilities</a>
            <a href="{{ url_for('index') }}#contact">Contact</a>
            <a href="{{ url_for('index') }}#chatbot">Chatbot</a>
    </div>

    <div class="auth-buttons">
        <a href="{{ url_for('login') }}" class="btn btn-login">Login</a>
        <a href="{{ url_for('login') }}?form=signup" class="btn btn-signup">Sign Up</a>
    </div>
</div>

<!-- ================= FORM ================= -->
<div class="container">
    <div class="box">

        <!-- TOGGLE -->
        <div class="toggle">
            <button id="loginBtn" class="active" onclick="showLogin()">Login</button>
            <button id="signupBtn" onclick="showSignup()">Signup</button>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" method="POST">
            <input type="hidden" name="action" value="login">

            <div class="inputBox">
                <input type="email" name="email" id="loginEmail" required>
                <label>Email</label>
            </div>

            <div class="inputBox">
                <input type="password" name="password" id="loginPassword" required>
                <label>Password</label>
            </div>

            <input type="submit" value="Login">
        </form>

        <!-- SIGNUP -->
        <form id="signupForm" method="POST" style="display:none;">
            <input type="hidden" name="action" value="signup">

            <div class="inputBox">
                <input type="text" name="name" id="name" required>
                <label>Full Name</label>
            </div>

            <div class="inputBox">
                <input type="email" name="email" id="signupEmail" required>
                <label>Email</label>
            </div>

            <div class="inputBox">
                <input type="text" name="phone" id="phone" required>
                <label>Phone Number</label>
            </div>

            <div class="inputBox">
                <input type="text" name="phone" id="phone" required>
                <label>Address</label>
            </div>

            <div class="inputBox">
                <input type="password" name="password" id="password" required>
                <label>Password</label>
            </div>

            <div class="inputBox">
                <input type="password" name="confirm_password" id="confirmPassword" required>
                <label>Confirm Password</label>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" name="terms">
                <label for="terms">
                    I agree to the <a href="#">Terms and Conditions</a>
                </label>
            </div>

            <input type="submit" value="Signup">
        </form>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">© 2026 Sports Complex Booking System</div>


<!-- ================= SCRIPT ================= -->
<script>
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");

/* =======================
   TOGGLE FORMS
======================= */
function showLogin() {
    loginForm.style.display = "block";
    signupForm.style.display = "none";

    loginBtn.classList.add("active");
    signupBtn.classList.remove("active");
}

function showSignup() {
    loginForm.style.display = "none";
    signupForm.style.display = "block";

    signupBtn.classList.add("active");
    loginBtn.classList.remove("active");
}

/* =======================
   SIGNUP VALIDATION + AJAX
======================= */
signupForm.addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("signupEmail").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;
    let terms = document.getElementById("terms").checked;

    if (!name || !email || !phone || !password || !confirm) {
        Swal.fire("Error", "All fields are required!", "error");
        return;
    }

    if (password !== confirm) {
        Swal.fire("Error", "Passwords do not match!", "error");
        return;
    }

    if (!terms) {
        Swal.fire("Error", "You must agree to Terms and Conditions!", "error");
        return;
    }

    fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
            action: "signup",
            name,
            email,
            phone,
            password,
            confirm_password: confirm
        })
    })
    .then(async res => {
        const text = await res.text();
        try {
            return JSON.parse(text);
        } catch {
            console.error("NOT JSON RESPONSE:", text);
            throw new Error("Server returned non-JSON response");
        }
    })
    .then(data => {
        if (data.status === "success") {

            Swal.fire({
                icon: "success",
                title: "Account Created!",
                text: "Please wait for admin approval.",
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                showLogin();
                signupForm.reset();
            });

        } else {
            Swal.fire("Error", data.message, "error");
        }
    });
});


/* =======================
   LOGIN VALIDATION + AJAX
======================= */
loginForm.addEventListener("submit", function(e) {
    e.preventDefault();

    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value;

    if (!email || !password) {
        Swal.fire("Error", "Please fill in all fields!", "error");
        return;
    }

    fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
            action: "login",
            email,
            password
        })
    })
    .then(async res => {
        const text = await res.text();
        try {
            return JSON.parse(text);
        } catch {
            console.error("NOT JSON RESPONSE:", text);
            throw new Error("Server returned non-JSON response");
        }
    })
    .then(data => {
        if (data.status === "success") {

            Swal.fire({
                icon: "success",
                title: "Login Successful!",
                text: "Redirecting...",
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "/";
            });

        } else {
            Swal.fire("Login Failed", data.message, "error");
        }
    });
});


/* =======================
   AUTO LOAD FORM
======================= */
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const form = params.get("form");

    if (form === "signup") {
        showSignup();
    } else {
        showLogin();
    }
};
</script>

</body>

</html>
