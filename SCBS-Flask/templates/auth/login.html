<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --dark: #205072;
            --teal: #329D9C;
            --green: #56C596;
            --light-green: #7BE495;
            --mint: #CFF4D2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--mint), #ffffff);
            min-height: 100vh;
            display: block;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 60px;
            background: var(--dark);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--light-green);
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-login {
            border: 1px solid var(--light-green);
            color: var(--light-green);
        }

        .btn-login:hover {
            background: var(--light-green);
            color: var(--dark);
        }

        .btn-signup {
            background: var(--green);
            color: white;
        }

        .btn-signup:hover {
            background: var(--light-green);
            color: var(--dark);
        }

        /* ================= FORM WRAPPER ================= */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 30px 15px;
        }

        /* ================= LOGIN BOX ================= */
        .box {
            width: 400px;
            padding: 40px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        /* ================= TOGGLE ================= */
        .toggle {
            display: flex;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            background: #f1f5f4;
        }

        .toggle button {
            flex: 1;
            padding: 10px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: #666;
            font-size: 14px;
            transition: 0.3s;
        }

        .toggle button.active {
            background: var(--teal);
            color: white;
        }

        /* ================= INPUT ================= */
        .inputBox {
            position: relative;
            margin-bottom: 25px;
        }

        .inputBox input {
            width: 100%;
            padding: 12px 40px 12px 10px; /* right padding for eye icon */
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .inputBox input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(50, 157, 156, 0.15);
        }

        .inputBox label {
            position: absolute;
            top: -10px;
            left: 10px;
            background: white;
            padding: 0 5px;
            font-size: 12px;
            color: var(--dark);
        }

        /* ================= EYE ICON ================= */
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #aaa;
            font-size: 15px;
            transition: color 0.2s;
            user-select: none;
        }

        .eye-icon:hover {
            color: var(--teal);
        }

        /* ================= FORGOT PASSWORD ================= */
        .forgot-password {
            text-align: right;
            margin-top: -15px;
            margin-bottom: 20px;
        }

        .forgot-password a {
            font-size: 12px;
            color: var(--teal);
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .forgot-password a:hover {
            color: var(--dark);
            text-decoration: underline;
        }

        /* ================= TERMS ================= */
        .terms {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
        }

        .terms input {
            accent-color: var(--green);
        }

        .terms a {
            color: var(--teal);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* ================= BUTTON ================= */
        .box form button {
            width: 100%;
            background: var(--teal);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .box form button:hover {
            background: var(--dark);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }
        }

        /* FOOTER */
        .footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* BUTTON LOADING STATE */
        .loading-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            pointer-events: none;
            opacity: 0.8;
        }

        /* SPINNER */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
    <div class="logo">
        <i></i> Sports Complex
    </div>

    <div class="nav-links">
        <a href="{{ url_for('index') }}#home">Home</a>
        <a href="{{ url_for('index') }}#about">About</a>
        <a href="{{ url_for('index') }}#pricing">Pricing</a>
        <a href="{{ url_for('index') }}#facilities">Facilities</a>
        <a href="{{ url_for('index') }}#contact">Contact</a>
        <a href="{{ url_for('index') }}#chatbot">Chatbot</a>
    </div>

    <div class="auth-buttons">
        <a href="{{ url_for('login') }}" class="btn btn-login">Login</a>
        <a href="{{ url_for('login') }}?form=signup" class="btn btn-signup">Sign Up</a>
    </div>
</div>

<!-- ================= FORM ================= -->
<div class="container">
    <div class="box">

        <!-- TOGGLE -->
        <div class="toggle">
            <button id="loginBtn" class="active" onclick="showLogin()">Login</button>
            <button id="signupBtn" onclick="showSignup()">Signup</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" method="POST">
            <input type="hidden" name="action" value="login">

            <div class="inputBox">
                <input type="email" name="email" id="loginEmail" required>
                <label>Email</label>
            </div>

            <div class="inputBox">
                <input type="password" name="password" id="loginPassword" required>
                <label>Password</label>
                <span class="eye-icon" onclick="togglePassword('loginPassword', this)">
                    <i class="fa fa-eye"></i>
                </span>
            </div>

            <!-- FORGOT PASSWORD -->
            <div class="forgot-password">
                <a id="forgotPasswordLink">Forgot Password?</a>
            </div>

            <button type="submit" id="loginSubmit">Login</button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" method="POST" style="display:none;">
            <input type="hidden" name="action" value="signup">

            <div class="inputBox">
                <input type="text" name="name" id="name" required>
                <label>Full Name</label>
            </div>

            <div class="inputBox">
                <input type="email" name="email" id="signupEmail" required>
                <label>Email</label>
            </div>

            <div class="inputBox">
                <input type="password" name="password" id="password" required>
                <label>Password</label>
                <span class="eye-icon" onclick="togglePassword('password', this)">
                    <i class="fa fa-eye"></i>
                </span>
            </div>

            <div class="inputBox">
                <input type="password" name="confirm_password" id="confirmPassword" required>
                <label>Confirm Password</label>
                <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">
                    <i class="fa fa-eye"></i>
                </span>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" name="terms">
                <label for="terms">
                    I agree to the <a href="#" id="openTerms">Terms and Conditions</a>
                </label>
            </div>

            <button type="submit" id="signupSubmit">Signup</button>
        </form>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">© 2026 Sports Complex Booking System</div>


<!-- ================= SCRIPT ================= -->
<script>
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");

/* =======================
   TOGGLE PASSWORD VISIBILITY
======================= */
function togglePassword(inputId, iconSpan) {
    const input = document.getElementById(inputId);
    const icon = iconSpan.querySelector("i");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

/* =======================
   TOGGLE FORMS
======================= */
function showLogin() {
    loginForm.style.display = "block";
    signupForm.style.display = "none";

    loginBtn.classList.add("active");
    signupBtn.classList.remove("active");
}

function showSignup() {
    loginForm.style.display = "none";
    signupForm.style.display = "block";

    signupBtn.classList.add("active");
    loginBtn.classList.remove("active");
}

/* =======================
   FORGOT PASSWORD MODAL
======================= */
document.getElementById("forgotPasswordLink").addEventListener("click", function(e) {
    e.preventDefault();

    Swal.fire({
        title: "Forgot Password",
        html: `
            <p style="font-size:14px; color:#555; margin-bottom:16px;">
                Enter the email address linked to your account and we'll send you a password reset link.
            </p>
            <input
                type="email"
                id="forgotEmail"
                class="swal2-input"
                placeholder="Enter your email address"
                style="font-size:14px;"
            >
        `,
        confirmButtonText: "Send Reset Link",
        confirmButtonColor: "#329D9C",
        showCancelButton: true,
        cancelButtonText: "Cancel",
        cancelButtonColor: "#aaa",
        focusConfirm: false,
        showLoaderOnConfirm: true,
        preConfirm: () => {
            const email = document.getElementById("forgotEmail").value.trim();

            if (!email) {
                Swal.showValidationMessage("Please enter your email address.");
                return false;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                Swal.showValidationMessage("Please enter a valid email address.");
                return false;
            }

            // Send request to backend
            return fetch("/forgot-password", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ email })
            })
            .then(async res => {
                const text = await res.text();
                try {
                    return JSON.parse(text);
                } catch (e) {
                    throw new Error("Server returned an invalid response.");
                }
            })
            .then(data => {
                if (data.status !== "success") {
                    Swal.showValidationMessage(data.message || "Something went wrong. Please try again.");
                    return false;
                }
                return data;
            })
            .catch(err => {
                Swal.showValidationMessage(err.message || "Network error. Please try again.");
                return false;
            });
        },
        allowOutsideClick: () => !Swal.isLoading()
    }).then(result => {
        if (result.isConfirmed && result.value) {
            Swal.fire({
                icon: "success",
                title: "Reset Link Sent!",
                text: "Please check your email inbox for the password reset link.",
                confirmButtonColor: "#329D9C"
            });
        }
    });
});

/* =======================
   SIGNUP VALIDATION + AJAX
======================= */
signupForm.addEventListener("submit", function(e) {
    e.preventDefault();

    let btn = document.getElementById("signupSubmit");
    let originalText = btn.innerHTML;

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("signupEmail").value.trim();
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;
    let terms = document.getElementById("terms").checked;

    if (!name || !email || !password || !confirm) {
        Swal.fire("Error", "All fields are required!", "error");
        return;
    }

    if (password !== confirm) {
        Swal.fire("Error", "Passwords do not match!", "error");
        return;
    }

    if (!terms) {
        Swal.fire("Error", "You must agree to Terms and Conditions!", "error");
        return;
    }

    // START LOADING
    btn.innerHTML = `<span class="spinner"></span> Processing...`;
    btn.classList.add("loading-btn");
    btn.disabled = true;

    fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
            action: "signup",
            name,
            email,
            password,
            confirm_password: confirm
        })
    })
    .then(async res => {
        const text = await res.text();
        try {
            return JSON.parse(text);
        } catch (e) {
            console.error("INVALID JSON:", text);
            throw new Error("Server returned invalid response");
        }
    })
    .then(data => {
        btn.innerHTML = originalText;
        btn.classList.remove("loading-btn");
        btn.disabled = false;

        if (data.status === "success") {
            Swal.fire({
                icon: "success",
                title: "Account Created!",
                text: "Please login to continue.",
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                showLogin();
                signupForm.reset();
            });
        } else {
            Swal.fire("Error", data.message, "error");
        }
    })
    .catch(err => {
        btn.innerHTML = originalText;
        btn.classList.remove("loading-btn");
        btn.disabled = false;
        Swal.fire("Error", err.message, "error");
    });
});

/* =======================
   LOGIN VALIDATION + AJAX
======================= */
loginForm.addEventListener("submit", function(e) {
    e.preventDefault();

    let btn = document.getElementById("loginSubmit");
    let originalText = btn.innerHTML;

    let email = document.getElementById("loginEmail").value.trim();
    let password = document.getElementById("loginPassword").value;

    if (!email || !password) {
        Swal.fire("Error", "Please fill in all fields!", "error");
        return;
    }

    // START LOADING
    btn.innerHTML = `<span class="spinner"></span> Logging in...`;
    btn.classList.add("loading-btn");
    btn.disabled = true;

    fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ action: "login", email, password })
    })
    .then(res => res.json())
    .then(data => {
        btn.innerHTML = originalText;
        btn.classList.remove("loading-btn");
        btn.disabled = false;

        if (data.status === "success") {
            Swal.fire({
                icon: "success",
                title: "Login Successful!",
                text: "Redirecting...",
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "/";
            });
        } else {
            Swal.fire("Login Failed", data.message, "error");
        }
    })
    .catch(err => {
        btn.innerHTML = originalText;
        btn.classList.remove("loading-btn");
        btn.disabled = false;
        Swal.fire("Error", err.message, "error");
    });
});

/* =======================
   AUTO LOAD FORM
======================= */
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const form = params.get("form");

    if (form === "signup") {
        showSignup();
    } else {
        showLogin();
    }
};
</script>

<script>
/* =======================
   TERMS AND CONDITIONS
======================= */
document.getElementById("openTerms").addEventListener("click", function(e) {
    e.preventDefault();

    Swal.fire({
        title: "Terms and Conditions",
        width: 700,
        html: `
            <div style="text-align:left; max-height:400px; overflow-y:auto; font-size:14px; line-height:1.6;">
                
                <h3>1. User Responsibilities</h3>
                <p>Users must provide accurate and complete information when registering and booking facilities.</p>

                <h3>2. Booking Policy</h3>
                <p>All reservations must be made in advance and are subject to availability.</p>
                <p>Failure to attend a booking may result in restrictions on future reservations.</p>

                <h3>3. Payment Terms</h3>
                <p>Payments must be completed before confirming any reservation.</p>
                <p>No refunds will be issued once the booking is finalized unless approved by management.</p>

                <h3>4. Account Security</h3>
                <p>You are responsible for maintaining the confidentiality of your account credentials.</p>

                <h3>5. Prohibited Activities</h3>
                <ul>
                    <li>Misuse of the system</li>
                    <li>Providing false information</li>
                    <li>Attempting unauthorized access</li>
                </ul>

                <h3>6. Account Status</h3>
                <p>Accounts may be marked as <b>Inactive</b> or <b>Banned</b> depending on violations or administrative decisions.</p>

                <h3>7. Changes to Terms</h3>
                <p>The system administrators reserve the right to update these terms at any time without prior notice.</p>

                <br>
                <p><b>By using this system, you agree to comply with all the terms stated above.</b></p>

            </div>
        `,
        confirmButtonText: "Close",
        confirmButtonColor: "#329D9C"
    });
});
</script>

</body>
</html>
