<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Sports Complex</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --dark: #205072;
            --teal: #329D9C;
            --green: #56C596;
            --light-green: #7BE495;
            --mint: #CFF4D2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--mint), #ffffff);
            min-height: 100vh;
            display: block;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 60px;
            background: var(--dark);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--light-green); }

        .auth-buttons { display: flex; gap: 10px; }

        .btn {
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-login {
            border: 1px solid var(--light-green);
            color: var(--light-green);
        }

        .btn-login:hover {
            background: var(--light-green);
            color: var(--dark);
        }

        .btn-signup {
            background: var(--green);
            color: white;
        }

        .btn-signup:hover {
            background: var(--light-green);
            color: var(--dark);
        }

        /* ================= CONTAINER ================= */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 30px 15px;
        }

        /* ================= BOX ================= */
        .box {
            width: 420px;
            padding: 40px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        /* ================= ICON HEADER ================= */
        .icon-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
            text-align: center;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--teal), var(--green));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }

        .icon-circle i {
            font-size: 26px;
            color: white;
        }

        .icon-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .icon-header p {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }

        /* ================= ERROR BANNER ================= */
        .error-banner {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            color: #b91c1c;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ================= INPUT ================= */
        .inputBox {
            position: relative;
            margin-bottom: 25px;
        }

        .inputBox input {
            width: 100%;
            padding: 12px 40px 12px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .inputBox input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(50, 157, 156, 0.15);
        }

        .inputBox label {
            position: absolute;
            top: -10px;
            left: 10px;
            background: white;
            padding: 0 5px;
            font-size: 12px;
            color: var(--dark);
            font-weight: 600;
        }

        /* ================= EYE ICON ================= */
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #aaa;
            font-size: 15px;
            transition: color 0.2s;
            user-select: none;
        }

        .eye-icon:hover { color: var(--teal); }

        /* ================= PASSWORD STRENGTH ================= */
        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar span {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: #e5e7eb;
            transition: background 0.3s;
        }

        .strength-label {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
            text-align: right;
        }

        /* ================= SUBMIT BUTTON ================= */
        .submit-btn {
            width: 100%;
            background: var(--teal);
            border: none;
            color: white;
            padding: 13px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 5px;
        }

        .submit-btn:hover { background: var(--dark); }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ================= BACK LINK ================= */
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .back-link a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover { text-decoration: underline; }

        /* ================= SPINNER ================= */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ================= FOOTER ================= */
        .footer {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .box { width: 100%; }
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
    <a href="{{ url_for('index') }}" class="logo">Sports Complex</a>

    <div class="nav-links">
        <a href="{{ url_for('index') }}#home">Home</a>
        <a href="{{ url_for('index') }}#about">About</a>
        <a href="{{ url_for('index') }}#pricing">Pricing</a>
        <a href="{{ url_for('index') }}#facilities">Facilities</a>
        <a href="{{ url_for('index') }}#contact">Contact</a>
        <a href="{{ url_for('index') }}#chatbot">Chatbot</a>
    </div>

    <div class="auth-buttons">
        <a href="{{ url_for('login') }}" class="btn btn-login">Login</a>
        <a href="{{ url_for('login') }}?form=signup" class="btn btn-signup">Sign Up</a>
    </div>
</div>

<!-- ================= FORM ================= -->
<div class="container">
    <div class="box">

        <!-- HEADER -->
        <div class="icon-header">
            <div class="icon-circle">
                <i class="fa fa-lock"></i>
            </div>
            <h2>Set New Password</h2>
            <p>Enter and confirm your new password below.<br>Make sure it's at least 6 characters.</p>
        </div>

        <!-- ERROR BANNER (shown if token is invalid/missing on page load) -->
        {% if error %}
        <div class="error-banner">
            <i class="fa fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <!-- FORM -->
        <form id="resetForm">
            <input type="hidden" id="token" value="{{ token }}">

            <div class="inputBox">
                <input type="password" id="newPassword" placeholder=" " required>
                <label>New Password</label>
                <span class="eye-icon" onclick="togglePassword('newPassword', this)">
                    <i class="fa fa-eye"></i>
                </span>
            </div>

            <!-- Password strength indicator -->
            <div style="margin-top: -15px; margin-bottom: 20px;">
                <div class="strength-bar">
                    <span id="bar1"></span>
                    <span id="bar2"></span>
                    <span id="bar3"></span>
                    <span id="bar4"></span>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="inputBox">
                <input type="password" id="confirmPassword" placeholder=" " required>
                <label>Confirm Password</label>
                <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">
                    <i class="fa fa-eye"></i>
                </span>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Reset Password
            </button>
        </form>

        <div class="back-link">
            Remembered it? <a href="{{ url_for('login') }}">Back to Login</a>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">© 2026 Sports Complex Booking System</div>


<script>
/* =======================
   TOGGLE PASSWORD VISIBILITY
======================= */
function togglePassword(inputId, iconSpan) {
    const input = document.getElementById(inputId);
    const icon  = iconSpan.querySelector("i");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

/* =======================
   PASSWORD STRENGTH METER
======================= */
const colors = {
    weak:   "#ef4444",
    fair:   "#f97316",
    good:   "#eab308",
    strong: "#22c55e"
};

function getStrength(pw) {
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
}

document.getElementById("newPassword").addEventListener("input", function () {
    const pw     = this.value;
    const score  = getStrength(pw);
    const bars   = ["bar1", "bar2", "bar3", "bar4"];
    const labels = ["", "Weak", "Fair", "Good", "Strong"];
    const clrs   = ["", colors.weak, colors.fair, colors.good, colors.strong];

    bars.forEach((id, i) => {
        document.getElementById(id).style.background =
            i < score ? clrs[score] : "#e5e7eb";
    });

    const label = document.getElementById("strengthLabel");
    label.textContent = pw.length ? labels[score] : "";
    label.style.color = clrs[score] || "#aaa";
});

/* =======================
   FORM SUBMIT
======================= */
document.getElementById("resetForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const token   = document.getElementById("token").value.trim();
    const pw      = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const btn     = document.getElementById("submitBtn");

    if (!token) {
        Swal.fire({
            icon: "error",
            title: "Invalid Link",
            text: "This reset link is invalid. Please request a new one.",
            confirmButtonColor: "#329D9C"
        });
        return;
    }

    if (pw.length < 6) {
        Swal.fire({
            icon: "error",
            title: "Too Short",
            text: "Password must be at least 6 characters.",
            confirmButtonColor: "#329D9C"
        });
        return;
    }

    if (pw !== confirm) {
        Swal.fire({
            icon: "error",
            title: "Mismatch",
            text: "Passwords do not match. Please try again.",
            confirmButtonColor: "#329D9C"
        });
        return;
    }

    // Loading state
    const original    = btn.innerHTML;
    btn.innerHTML     = `<span class="spinner"></span> Resetting...`;
    btn.disabled      = true;

    fetch("/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
            token,
            password: pw,
            confirm_password: confirm
        })
    })
    .then(async res => {
        const text = await res.text();
        try { return JSON.parse(text); }
        catch { throw new Error("Server returned an invalid response."); }
    })
    .then(data => {
        btn.innerHTML = original;
        btn.disabled  = false;

        if (data.status === "success") {
            Swal.fire({
                icon: "success",
                title: "Password Reset!",
                text: "Your password has been updated successfully. You can now log in.",
                confirmButtonText: "Go to Login",
                confirmButtonColor: "#329D9C",
                allowOutsideClick: false
            }).then(() => {
                window.location.href = "{{ url_for('login') }}";
            });
        } else {
            Swal.fire({
                icon: "error",
                title: "Reset Failed",
                text: data.message || "Something went wrong. Please try again.",
                confirmButtonColor: "#329D9C"
            });
        }
    })
    .catch(err => {
        btn.innerHTML = original;
        btn.disabled  = false;
        Swal.fire({
            icon: "error",
            title: "Error",
            text: err.message,
            confirmButtonColor: "#329D9C"
        });
    });
});
</script>

</body>
</html>
